<%
format = ENV.fetch("CUCUMBER_FORMAT", "pretty")
rerun_targets = File.file?("rerun.txt") ? File.read("rerun.txt").strip : ""
rerun_args = rerun_targets.empty? ? "features" : rerun_targets
default_profile = "--publish-quiet --format #{format} --strict --tags 'not @wip' features"
rerun_profile = "--publish-quiet --format #{format} --format rerun --out rerun.txt --strict --tags 'not @wip' #{rerun_args}"
%>
default: <%= default_profile %>
wip: --publish-quiet --format pretty --strict --tags @wip --wip features
rerun: <%= rerun_profile %>
