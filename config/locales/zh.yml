    current_status_essential: "仅允许必要 Cookie"
    current_status_all: "已接受可选 Cookie"
    settings_eyebrow: "管理同意"
    settings_title: "选择这个浏览器允许的范围"
    settings_body: "拒绝非必要 Cookie 时，只会保留站点运行所需的核心 Cookie。接受全部时，也会记录你对可选分析 Cookie 的同意。"
    settings_note: "你可以随时通过页脚中的链接回到这里更新选择。"
    card_essential_eyebrow: "始终开启"
