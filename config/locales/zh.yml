# Legal
  legal:
    title: "法律"
    header: "法律"
    blurb: "以简明方式说明使用本站时适用的主要条款与责任。"
    paragraph_1: "GotTheKeys 提供的信息旨在帮助房源展示，并支持业主、买家、租客与管理员之间的沟通。本站提供的是实用服务，不构成法律、税务、按揭或过户建议。"
    paragraph_2: "如果你创建账户或发布房源，需要确保提交的信息准确、最新且可以合法公开，包括价格、照片、描述、可用时间以及有关房屋状况的说明。"
    paragraph_3: "我们会尽力保持网站稳定并清晰展示信息，但不能保证服务绝不中断，也不能保证每一次搜索、咨询或消息都会即时送达。维护、浏览器差异和第三方网络问题都可能影响可用性。"
    paragraph_4: "本站的内容、品牌和软件均受相关知识产权法律保护。你可以使用本站浏览、咨询和管理真实房源，但不得批量抓取数据、滥用账户或未经授权转载内容。"
    paragraph_5: "如果你准备出价、出租或购买房产，请在正式决定前自行获取专业建议。合同、产权核验、测量、融资和交割安排均不属于网站服务范围，仍由交易各方自行负责。"
    summary_badge: "快速概览"
    summary_count: "个法律要点"
    quick_guide_label: "快速说明"
    quick_guide_title: "先明确网站能做什么"
    quick_guide_body: "平台帮助你展示房源并处理沟通，但法律和专业层面的决定仍需交易各方自行判断。"
