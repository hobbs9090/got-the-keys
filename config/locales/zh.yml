    optional_title: "可选分析 Cookie"
    optional_body: "仅用于流量分析和改进体验。除非你明确同意，否则它们应保持关闭。"
    preference_title: "同意偏好"
    status_title: "当前浏览器选择"
    status_body: "当前部署默认阻止可选分析 Cookie。你保存的选择只会记录：如果未来启用这类 Cookie，这个浏览器是否允许。"
