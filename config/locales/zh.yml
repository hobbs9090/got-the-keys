    paragraph_2: "如果你是营销你的家，自己的以及用人地产代理，你需要知道你的合同与该机构的条款。 “独家代理”意味着你将支付代理人的佣金，只有当他们找到买家，为您的家庭，但同意“独家销售权”，到头来你会付给他们，即使你找到买家。有灰色地带，但是。如果你找到一个买家，私下谁原来是书本上您指定的地产代理，他们不得不为他们的营销活动的结果证明销售工作。但是，如果买家看到的结果，地产代理登录你的房子以外，代理商找出敲你的门，他们付款的情况下强得多。"
    paragraph_3: "火腿球头菲力牛排昂杜耶法兰克福鸡臀香肠肉丸。菲力牛排肉饼地面轮火腿（昂杜耶）跗关节猪肉。风干牛肉短里脊的丸子头汉堡包猪。土耳其鹿肉夹头，舌的膘尾猪干腌牛肉柄波兰熏肠火腿眼肌火腿三尖。臀部腊肉五花肉肉饼肩：短腰部丸子波兰熏肠猪肉里脊舌风干牛肉牛腩咸牛肉火腿面颊。牛肉肋骨克尔短肋五花肉腌牛肉膘猪排舌干肉片布丹牛柳牛腩肉饼培根。"

