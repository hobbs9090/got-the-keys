# Cookie Policy
  cookie_policy:
    title: "Cookie 政策"
    header: "Cookie 政策"
    hero_eyebrow: "隐私控制"
    hero_body: "本网站会使用必要 Cookie 来保证登录、表单和语言偏好正常工作。可选分析类 Cookie 应默认关闭，只有在你明确同意后才可启用，而且你可以随时回到这里修改。"
    banner_eyebrow: "Cookie 选择"
    banner_title: "我们使用 Cookie 来保证网站正常运行"
    banner_body: "必要 Cookie 会保持开启，因为它们支持安全登录、表单和核心导航。可选分析类 Cookie 会保持关闭，除非你选择允许。"
