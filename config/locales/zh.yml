# How It Works
  how_it_works:
    title: "运作方式"
    hero_title: "如何更清楚、更可信地推广你的房屋"
    hero_body: "好的房源推广通常并不复杂：定价要合理，展示要真实，回答买家或租客真正关心的问题，并在收到咨询后持续推进。这一页解释了具体怎么做，以及 GotTheKeys 在流程中的作用。"
    primary_cta: "创建账户"
    secondary_cta: "查看推广指南"
    hero_badge: "业主主导推广"
    hero_panel_title: "这一页是做什么的"
    hero_panel_body: "这里讲的是从定价、展示、咨询、看房，到报价和法律交接的实际步骤。"
    hero_point_1: "用有依据的方式设定价格。"
    hero_point_2: "写出让人信任的房源文案。"
    hero_point_3: "持续推进看房、反馈和下一步。"
    jump_nav_label: "运作方式页面分区"
    jump_tab_process: "整体流程"
    jump_tab_marketing: "如何推广"
    jump_tab_viewings: "看房与报价"
    jump_tab_finish: "达成条件后"
    process_eyebrow: "整体流程"
    process_title: "从上线到谈妥条件的一条更清晰路径"
    process_intro: "这个平台帮助业主掌握推广和沟通工作；等进入法律阶段后，你仍然可以交给律师或持牌过户人员处理正式手续。"
    stage_1_title: "准备并定价"
    stage_1_body: "先参考可比成交、当前竞争房源和房屋现状。目标是尽早吸引真实兴趣，而不是把房源高挂几个月试水。"
    stage_2_title: "把房子展示好"
    stage_2_body: "高质量照片、真实描述和清楚的房间信息，通常比夸张文案和空泛宣传更有效。"
    stage_3_title: "管理咨询和看房"
    stage_3_body: "尽快回复，提供合理的可约时间，并记录大家反复询问的问题，这样你可以持续优化房源。"
    stage_4_title: "比较报价并推进"
    stage_4_body: "不要只看金额。时间安排、交易链、贷款准备情况和灵活度，在决定进入法律流程前都很重要。"
    marketing_eyebrow: "如何推广"
    marketing_title: "真正有效的房屋推广长什么样"
    marketing_intro: "好的推广不是把房子说得比实际更夸张，而是让合适的买家或租客快速理解房源，并相信他们看到的内容。"
    marketing_card_1_title: "设定一个你能解释清楚的价格"
    marketing_card_1_body: "结合近期成交、当前在售竞争房源和房屋现状来判断。一个接近市场的价格，通常比一开始挂得太高、后面不断降价更有效。"
    marketing_card_2_title: "拍照前先把房子准备好"
    marketing_card_2_body: "光线、整洁和清楚的空间感，比刻意摆拍更重要。重点是让人一眼看明白空间、布局和状态。"
    marketing_card_3_title: "围绕真实问题来写文案"
    marketing_card_3_body: "告诉别人他们真正想知道的内容：布局、户外空间、停车、收纳、已完成的改善、仍需处理的问题，以及位置在日常生活中的便利性。"
    marketing_card_4_title: "上线后保持信息更新"
    marketing_card_4_body: "如果价格变了、照片更新了，或可看房时间调整了，就尽快修改房源。准确而新鲜的信息更容易把有效咨询继续推进。"
    pricing_badge: "定价提示"
    pricing_title: "依靠依据，而不是凭希望猜价格"
    pricing_body: "土地注册处的成交记录、当前竞争房源，以及对房屋现状的真实判断，通常比直接写下你理想中的价格更可靠。"
    publish_badge: "发布前"
    publish_title: "上线前值得做的五个检查"
    publish_check_1: "首图应该最能说明房子的优势，而不一定只是默认放门头照。"
    publish_check_2: "价格要足够接近市场，才能尽早吸引注意。"
    publish_check_3: "房间数量、户外空间、停车、收纳以及明显短板都要写清楚。"
    publish_check_4: "提供你真正能配合的看房时间，避免咨询很快冷掉。"
    publish_check_5: "提前准备好回答产权、服务费、交易链位置或搬离时间等问题。"
    agency_note_badge: "实务提示"
    agency_note_title: "如果你还在和其他中介合作"
    agency_note_body: "请仔细查看协议。像独家代理或独家销售权这样的条款，可能会影响是否仍需支付佣金，即使最终买家或租客是在别处先看到房源。"
    playbook_eyebrow: "实用指南"
    playbook_title: "怎样把房子推广得更好"
    playbook_intro: "好的推广不是夸张，而是让合适的人快速理解房子、相信细节，并知道下一步该怎么做。"
    playbook_step_1_title: "1. 先把房子准备到适合拍照"
    playbook_step_1_body: "目标不是让房子看起来完全不一样，而是让空间、布局和状态在几秒内就能被看懂。"
    playbook_step_1_point_1: "拉开窗帘，在需要时开灯，并尽量在自然光干净的时候拍摄。"
    playbook_step_1_point_2: "移走明显杂物、垃圾桶、晾衣架，以及任何会让空间显得更难判断的东西。"
    playbook_step_1_point_3: "选择最能代表房子卖点的首图，而不是机械地用第一张。"
    playbook_step_2_title: "2. 围绕真实问题来写房源文案"
    playbook_step_2_body: "好的文案通常是在回答第一次看房时会被问到的问题，而不是依赖空洞的销售词。"
    playbook_step_2_point_1: "诚实描述布局，例如餐厨一体、独立书房、阁楼房间、阳台、花园、停车位或共用通道。"
    playbook_step_2_point_2: "解释这套房子在日常生活里为什么好用，而不是一味写“绝佳”“惊艳”“必看”。"
    playbook_step_2_point_3: "如果价格反映了需要翻新、租期较短或其他限制，也应当为认真买家说明清楚。"
    playbook_step_3_title: "3. 认真处理咨询和看房"
    playbook_step_3_body: "快速而平稳的跟进能让好的意向保持热度，也能帮助你发现房源页面还需要改进的地方。"
    playbook_step_3_point_1: "趁房源还在咨询者脑海里时尽快回复。"
    playbook_step_3_point_2: "提供真实可行的时间，不要先答应再临时改期。"
    playbook_step_3_point_3: "把重复出现的问题记下来，以便优化文案并提前准备更好的回答。"
    playbook_step_4_title: "4. 更聪明地使用反馈和报价"
    playbook_step_4_body: "看房之后，最有效的下一步通常是简短而有用的跟进，而不是施压。"
    playbook_step_4_point_1: "问清楚是什么让对方犹豫：价格、房间大小、需要做的工程，还是位置。"
    playbook_step_4_point_2: "如果同样的反馈反复出现，就考虑调整照片、文案或价格。"
    playbook_step_4_point_3: "比较报价时，不仅看数字，也看对方的准备程度和可靠性。"
    timeline_eyebrow: "看房与报价"
    timeline_title: "房源上线后会发生什么"
    timeline_intro: "当房源公开之后，重点就不再只是展示，而是节奏、清晰度和持续推进。"
    timeline_1_badge: "01 上线"
    timeline_1_title: "一开始就把基础做好"
    timeline_1_body: "用好的照片、真实的房间信息和可执行的看房安排来上线。"
    timeline_2_badge: "02 咨询"
    timeline_2_title: "回答问题并判断意向"
    timeline_2_body: "如果同样的疑问一再出现，不如直接优化房源页面，而不是一次次单独解释。"
    timeline_3_badge: "03 看房"
    timeline_3_title: "让看房过程简单而有价值"
    timeline_3_body: "提供能兑现的时间，准备好讲解重点，并在看房后立刻记录反馈。"
    timeline_4_badge: "04 报价"
    timeline_4_title: "比较的是整体条件"
    timeline_4_body: "价格很重要，但交易链、贷款准备情况、灵活度和推进速度同样关键。"
    timeline_5_badge: "05 法律阶段"
    timeline_5_title: "把事情清楚地交给法律团队"
    timeline_5_body: "当主要条件谈妥后，事务仍然需要交给律师或持牌过户人员。清楚的记录会让交接轻松很多。"
    finish_eyebrow: "达成条件后"
    finish_title: "推广带来兴趣，清楚的记录帮助你真正成交。"
    finish_body: "GotTheKeys 的设计重点，是帮助业主保持房源信息更新、整理看房安排，并以更少混乱和更少浪费时间的方式进入法律阶段。"
    finish_primary_cta: "创建账户"
    finish_secondary_cta: "联系我们"

# About Us
  about_us:
    title: "关于我们"
    header: "关于 GotTheKeys"
    blurb: "我们为希望控制成本、掌握流程并直接获得有效咨询的业主打造这项服务。"
    paragraph_1: "GotTheKeys 适合希望拥有专业在线展示效果、同时又不想把每一步都交给传统中介的卖家和房东。"
    paragraph_2: "你可以自己决定房源如何描述、何时更新照片、多快回复咨询，以及什么时候安排看房。这通常会带来更好的沟通和更少的延误。"
    paragraph_3: "如果你同时也在使用传统中介，请务必仔细阅读合同。像独家代理或独家销售权这样的条款，可能会影响佣金在什么情况下需要支付。"

