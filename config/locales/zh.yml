# Welcome
  welcome:
    title: "家"
    welcome_message: "更从容地出售或出租"
    tool_tip: "市场洞察"
    tool_tip_content: "查看有助于业主更好定价和展示房源的实用信息。"
    try_today: "为什么人们选择 GotTheKeys"
    paragraph_1: "GotTheKeys 帮助业主和房东创建清晰、可信的房源页面，同时保留对整个流程的主动权。"
    paragraph_2: "你可以添加关键信息、上传照片和平面图，并直接回复咨询，让买家和租客更快获得准确内容。"
    paragraph_3: "平台支持对比出售与出租房源、判断定价是否合理，并在市场变化时及时更新房源信息。"
    paragraph_4: "从第一条咨询到达成报价，我们的目标很简单：降低摩擦、降低成本，让交易双方都更省心。"

# Legal
  legal:
    title: "法律"
    header: "法律"
    blurb: "以简明方式说明使用本站时适用的主要条款与责任。"
    paragraph_1: "GotTheKeys 提供的信息旨在帮助房源展示，并支持业主、买家、租客与管理员之间的沟通。本站提供的是实用服务，不构成法律、税务、按揭或过户建议。"
    paragraph_2: "如果你创建账户或发布房源，需要确保提交的信息准确、最新且可以合法公开，包括价格、照片、描述、可用时间以及有关房屋状况的说明。"
    paragraph_3: "我们会尽力保持网站稳定并清晰展示信息，但不能保证服务绝不中断，也不能保证每一次搜索、咨询或消息都会即时送达。维护、浏览器差异和第三方网络问题都可能影响可用性。"
    paragraph_4: "本站的内容、品牌和软件均受相关知识产权法律保护。你可以使用本站浏览、咨询和管理真实房源，但不得批量抓取数据、滥用账户或未经授权转载内容。"
    paragraph_5: "如果你准备出价、出租或购买房产，请在正式决定前自行获取专业建议。合同、产权核验、测量、融资和交割安排均不属于网站服务范围，仍由交易各方自行负责。"

# Cookie Policy
  cookie_policy:
    title: "政策"
    header: "政策"
    blurb: "说明我们如何使用 Cookie 和类似技术来保证网站正常运行。"
    paragraph_1: "我们使用必要的 Cookie 来保障登录安全、保存会话信息，并支持语言切换、表单填写和账户导航等核心功能。"
    paragraph_2: "我们也可能使用分析或性能类 Cookie，了解访客如何使用网站、哪些页面最有帮助，以及哪些步骤容易让人中断操作，从而持续改进搜索、咨询流程和页面性能。"
    paragraph_3:  "你可以随时在浏览器设置中管理或删除 Cookie。如果禁用必要 Cookie，登录、偏好保存和多步骤表单等功能可能无法正常工作。"

# How It Works
  how_it_works:
    title: "它是如何工作"
    next: "下"
    close: "关闭"
    panel_title_1: "节省费用"
    panel_body_1: "把最了解房子的那部分工作掌握在自己手里，在保持控制权的同时降低出售或出租成本。"
    panel_title_2: "用数据定价"
    panel_body_2: "使用土地注册处的数据，我们可以估算出你的财产价值的基础上的真正的购房者支付的价格，而不是率性的地产代理。"
    panel_body_2_part_1: "通过使用 "
    land_registry: "土地注册处"
    panel_body_2_part_2: " 数据，我们可以根据真实成交情况帮助你判断房产价值，而不是只依赖中介的主观判断。"
    data_feeds: "结合近期成交记录和周边可比房源，你可以更快发现定价是否偏高，并向认真买家说明你的依据。"
    panel_title_3: "展示房源"
    panel_body_3: "高质量照片、真实描述和清晰的房间信息，通常比空泛的宣传语更能带来有效咨询。"
    panel_title_4: "掌控房源"
    panel_body_4: "当价格、可用状态或房屋情况发生变化时，你可以立即更新描述、图片和关键信息。"
    panel_title_5: "安排看房"
    panel_body_5: "提供适合你的看房时段，并清楚记录谁会来、他们关心什么。"
    panel_title_6: "跟进意向"
    panel_body_6: "把咨询、追问和看房反馈放在一起，更容易判断谁是真正准备推进的人。"
    panel_title_7: "比较报价"
    panel_body_7: "在做决定前，同时比较报价金额、交易链、时间安排以及买家的准备情况。"
    panel_title_8: "进入成交"
    panel_body_8: "当核心条件谈妥后，你可以把交易交给律师推进，并保留一份清晰的房源与沟通记录。"
    manage_account: "操作说明"
    manage_account_body: "你可以在“管理账户”中维护个人资料、更新房源，并随着看房和报价进展保持信息准确。"
    numero1: "省钱！"
    numero1_body: "没有人比你更了解自己的房子。你对采光、收纳、布局和周边环境的了解，能让看房沟通更具体、更有效。"
    numero2: "管理收看"
    numero2_body: "买卖双方可以直接选择合适的看房时间，不必依赖第三方来回传递时间安排。"
    numero3: "报价"
    numero3_body: "你可以直接讨论报价，记录附带条件，并在了解价格与买家情况后再决定下一步。"
    numero4: "过户"
    numero4_body: "到了需要处理法律手续的时候，你仍然可以委托律师或持牌过户人员，但无需为自己已经完成的工作再支付额外中介费用。"

# About Us
  about_us:
    title: "关于我们"
    header: "关于 GotTheKeys"
    blurb: "我们为希望控制成本、掌握流程并直接获得有效咨询的业主打造这项服务。"
    paragraph_1: "GotTheKeys 适合希望拥有专业在线展示效果、同时又不想把每一步都交给传统中介的卖家和房东。"
    paragraph_2: "你可以自己决定房源如何描述、何时更新照片、多快回复咨询，以及什么时候安排看房。这通常会带来更好的沟通和更少的延误。"
    paragraph_3: "如果你同时也在使用传统中介，请务必仔细阅读合同。像独家代理或独家销售权这样的条款，可能会影响佣金在什么情况下需要支付。"

