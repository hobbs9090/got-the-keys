de:
  about_us:
    title: "Über uns"
    header: "Über GotTheKeys"
    all_about_us: "Über GotTheKeys"
    blurb: "Wir haben den Service für Eigentümer entwickelt, die klarere Kosten, mehr Kontrolle und einen direkteren Weg zu ernsthaften Anfragen möchten."
    paragraph_1: "GotTheKeys wurde für Verkäufer und Vermieter entwickelt, die professionell wirkendes Online-Marketing möchten, ohne jeden Schritt des Prozesses an eine traditionelle Agentur abzugeben."
    paragraph_2: "Mit der Plattform behalten Sie die Kontrolle über das Wesentliche: wie Ihre Immobilie beschrieben wird, wann Fotos aktualisiert werden, wie schnell Anfragen beantwortet werden und wann Besichtigungen stattfinden können. Das führt meist zu besserer Kommunikation und weniger Verzögerungen."
    paragraph_3: "Wenn Sie zusätzlich mit einem Makler zusammenarbeiten, lesen Sie Ihre Vereinbarung sorgfältig. Begriffe wie Alleinauftrag oder exklusives Vermarktungsrecht können beeinflussen, wann eine Provision fällig wird, auch wenn der spätere Käufer oder Mieter zuerst anderswo Kontakt aufgenommen hat."
    hero_eyebrow: "Über die Plattform"
    hero_title: "Eine direktere Immobilienplattform für Eigentümer, die Klarheit, Kontrolle und weniger vermeidbare Verzögerungen wollen"
    primary_cta: "Immobilien ansehen"
    secondary_cta: "Mit dem Team sprechen"
    hero_panel_badge: "Warum es sie gibt"
    hero_panel_title: "Gebaut für Eigentümer, die professionelle Präsentation wollen, ohne den gesamten Prozess aus der Hand zu geben"
    hero_panel_body: "GotTheKeys entstand aus einer einfachen Idee: Die Person, die der Immobilie am nächsten ist, sollte weiterhin das Inserat, die Informationen und den Reaktionsfluss steuern können."
    hero_point_1: "Das Inserat aktuell halten, wenn sich der Markt verändert"
    hero_point_2: "Ernsthaften Käufern oder Mietern das Handeln erleichtern"
    hero_point_3: "Die Unklarheit reduzieren, die Preise, Besichtigungen und Übergaben oft begleitet"
    story_eyebrow: "Unser Ansatz"
    story_title: "Entwickelt, um die wesentlichen Teile des Verkaufens oder Vermietens weniger zersplittert wirken zu lassen"
    values_eyebrow: "Worauf wir optimieren"
    values_title: "Ein besserer Inseratsablauf entsteht meist aus ein paar einfachen Prinzipien"
    values_intro: "Das Ziel ist nicht mehr Lärm. Es ist ein besserer Weg von korrekten Informationen zu einem ernsthaften Gespräch und dann zu einem bestätigten nächsten Schritt."
    value_1_title: "Eigentümergeführt, nicht agenturgeführt"
    value_1_body: "Die Plattform ist so aufgebaut, dass Eigentümer das Inserat, das Tempo von Aktualisierungen und den Anfragefluss gestalten können, ohne den Überblick zu verlieren."
    value_2_title: "Klareres Marketing, bessere Anfragen"
    value_2_body: "Uns geht es um klarere Texte, nützliche Fotos und nächste Schritte, die Aufmerksamkeit in ernsthafte Gespräche mit Käufern oder Mietern verwandeln."
    value_3_title: "Mehr Transparenz bei Verpflichtungen"
