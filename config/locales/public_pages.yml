fr:
  about_us:
    title: "À propos"
    header: "À propos de GotTheKeys"
    all_about_us: "À propos de GotTheKeys"
    blurb: "Nous avons conçu ce service pour les propriétaires qui veulent des coûts plus clairs, plus de contrôle et un accès plus direct à des demandes sérieuses."
    paragraph_1: "GotTheKeys a été créé pour les vendeurs et bailleurs qui veulent une présence en ligne professionnelle sans confier chaque étape du processus à une agence traditionnelle."
    paragraph_2: "La plateforme vous permet de contrôler l'essentiel : la manière dont votre bien est décrit, le moment où les photos sont mises à jour, la rapidité de réponse aux demandes et les créneaux de visite. Cela conduit généralement à une meilleure communication et à moins de retards."
    paragraph_3: "Si vous commercialisez aussi votre bien avec une agence, lisez attentivement votre contrat. Des notions comme le mandat exclusif peuvent influencer le moment où une commission devient due, même si l'acheteur ou le locataire final vous a découvert ailleurs."
    hero_eyebrow: "À propos de la plateforme"
    hero_title: "Une plateforme immobilière plus directe pour les propriétaires qui veulent de la clarté, du contrôle et moins de retards évitables"
