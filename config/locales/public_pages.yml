    secondary_cta: "Parler à l'équipe"
    hero_panel_badge: "Pourquoi elle existe"
    hero_panel_title: "Pensée pour les propriétaires qui veulent une présentation professionnelle sans céder tout le processus"
    hero_panel_body: "GotTheKeys repose sur une idée simple : la personne la plus proche du bien doit pouvoir continuer à piloter l'annonce, l'information et le flux de réponses."
    hero_point_1: "Garder l'annonce exacte lorsque le marché évolue"
    hero_point_2: "Permettre aux acheteurs ou locataires sérieux d'agir plus facilement"
    hero_point_3: "Réduire l'opacité qui entoure souvent le prix, les visites et la transmission"
