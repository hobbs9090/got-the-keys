  cookie_policy:
    header: "Cookie-Richtlinie"
    hero_eyebrow: "Datenschutz-Einstellungen"
    hero_body: "Diese Website verwendet notwendige Cookies, damit Anmeldung, Formulare und Spracheinstellungen funktionieren. Optionale Analysen bleiben aus, bis Sie ausdrücklich zustimmen, und Sie können diese Entscheidung hier jederzeit ändern."
    banner_eyebrow: "Cookie-Auswahl"
    banner_title: "Wir verwenden Cookies, damit die Website korrekt funktioniert"
    banner_body: "Notwendige Cookies bleiben aktiv, weil sie sichere Anmeldung, Formulare und die Kernnavigation unterstützen. Optionale Analysen bleiben aus, bis Sie sie ausdrücklich erlauben."
    banner_hint_html: "Sie können die vollständige Richtlinie lesen oder Ihre Entscheidung später auf der <a href='%{policy_path}'>Cookie-Einstellungsseite</a> ändern."
    manage_preferences: "Cookie-Einstellungen"
    accept_all: "Alle akzeptieren"
    reject_non_essential: "Nicht notwendige ablehnen"
    essential_title: "Notwendige Cookies"
    essential_body: "Erforderlich für Anmeldung, Sitzungs-Sicherheit, Sprachwahl und andere Kernfunktionen der Website."
    optional_title: "Optionale Analysen"
    optional_body: "Nur für Nutzungsanalyse und Verbesserungen. Diese bleiben aus, bis Sie ausdrücklich zustimmen."
    preference_title: "Einwilligungspräferenz"
    status_title: "Aktuelle Browser-Auswahl"
    status_body: "In dieser Installation sind optionale Analysen standardmäßig blockiert. Ihre gespeicherte Wahl hält nur fest, ob Sie nicht notwendige Cookies zulassen würden, falls sie später aktiviert werden."
    current_status_pending: "Entscheidung noch ausstehend"
    current_status_essential: "Nur notwendige Cookies"
    current_status_all: "Optionale Cookies akzeptiert"
    settings_eyebrow: "Einwilligung verwalten"
    settings_title: "Wählen Sie, was dieser Browser zulässt"
    settings_body: "Wenn Sie nicht notwendige Cookies ablehnen, bleiben nur die Kern-Cookies der Website aktiv. Wenn Sie alle akzeptieren, wird auch die Zustimmung für optionale Analysen gespeichert."
    settings_note: "Sie können jederzeit über den Footer auf diese Seite zurückkehren und Ihre Wahl ändern."
    card_essential_eyebrow: "Immer aktiv"
    card_essential_body: "Dazu gehören das Rails-Sitzungs-Cookie, der sichere Anmeldestatus sowie die Sprach- und Sitzungs-Kontinuität. Ohne sie funktionieren zentrale Teile der Website nicht."
    card_preference_eyebrow: "Präferenzspeicherung"
    card_preference_body: "Wir speichern ein kleines Präferenz-Cookie, damit die Website merkt, ob dieser Browser nicht notwendige Cookies akzeptiert oder abgelehnt hat."
    card_optional_eyebrow: "Standardmäßig aus"
    card_optional_body: "Wir laden keine optionalen Analyse-Cookies, bis eine Zustimmung vorliegt. Falls später Analysen hinzugefügt werden, steuert diese Einstellung, ob sie erlaubt oder blockiert werden."
    summary_eyebrow: "Auf einen Blick"
    summary_title: "Was am wichtigsten ist"
    summary_item_1_title: "Notwendiges bleibt an"
    summary_item_1_body: "Sicherheits-, Sitzungs- und sprachbezogene Cookies gelten als erforderlich für den Dienst."
    summary_item_2_title: "Ablehnen ist so einfach wie akzeptieren"
    summary_item_2_body: "Das Banner bietet beide Optionen direkt an, statt Nutzer zu einer einzigen positiven Aktion zu lenken."
    summary_item_3_title: "Sie können es später ändern"
    summary_item_3_body: "Über den Link zu den Cookie-Einstellungen im Footer können Sie die Wahl für diesen Browser jederzeit erneut prüfen."
    browser_eyebrow: "Browser-Steuerung"
    browser_title: "Sie können Cookies auch im Browser verwalten"
    browser_body: "Browser-Einstellungen können gespeicherte Cookies löschen oder vollständig blockieren, wobei das Blockieren notwendiger Cookies dazu führen kann, dass Anmeldung und Formulare nicht mehr normal funktionieren."
    browser_note: "Wir deaktivieren außerdem die nicht notwendige sessionStorage-Nutzung des Foundation-Eingabe-Helfers, sofern sie nicht wirklich gebraucht wird."

  how_it_works:
    hero_title: "So vermarkten Sie Ihr Zuhause mit mehr Klarheit und weniger Leerformeln"
    hero_body: "Gute Immobilienvermarktung ist meist einfach: realistisch bepreisen, ehrlich präsentieren, die Fragen beantworten, die Käufer und Mieter wirklich stellen, und dann das Tempo halten, sobald Anfragen eingehen. Diese Seite zeigt, wie das geht und wo GotTheKeys in den Ablauf passt."
    primary_cta: "Konto erstellen"
    secondary_cta: "Zum Vermarktungsleitfaden"
    hero_badge: "Eigentümergeführte Vermarktung"
    hero_panel_title: "Wofür diese Seite gedacht ist"
    hero_panel_body: "Ein praktischer Leitfaden zu Preisgestaltung, Präsentation, Anfragen, Besichtigungen, Angeboten und der Übergabe an die Rechtsberatung."
    hero_point_1: "Setzen Sie einen Preis, den Sie mit Fakten stützen können."
    hero_point_2: "Schreiben Sie ein Inserat, das echte Käuferfragen beantwortet."
    hero_point_3: "Halten Sie Besichtigungen, Feedback und nächste Schritte in Bewegung."
    jump_nav_label: "Abschnitte der How-it-works-Seite"
    jump_tab_process: "Der Ablauf"
    jump_tab_marketing: "Immobilie vermarkten"
    jump_tab_viewings: "Besichtigungen und Angebote"
    jump_tab_finish: "Nach der Einigung"
    process_eyebrow: "Der Ablauf"
    process_title: "Ein einfacherer Weg vom Inserat zu vereinbarten Konditionen"
    process_intro: "Die Plattform soll Eigentümern helfen, die Vermarktung und Kommunikation selbst zu steuern und dennoch einen Solicitor oder zugelassenen Conveyancer einzubinden, sobald die rechtliche Phase beginnt."
    stage_1_title: "Vorbereiten und bepreisen"
    stage_1_body: "Beginnen Sie mit vergleichbaren Verkäufen, der aktuellen Konkurrenz und einer realistischen Einschätzung des Zustands. Ziel ist echtes frühes Interesse, nicht monatelanges Ausprobieren."
    stage_2_title: "Das Zuhause sauber präsentieren"
    stage_2_body: "Starke Fotos, eine ehrliche Beschreibung und klare Raumangaben schlagen meist übertriebene Werbesprache und vage Versprechen."
    stage_3_title: "Anfragen und Besichtigungen steuern"
    stage_3_body: "Antworten Sie schnell, bieten Sie sinnvolle Verfügbarkeiten an und halten Sie fest, was gefragt wird, damit Sie das Inserat verbessern und sich auf ernsthaftes Interesse konzentrieren können."
    stage_4_title: "Angebote prüfen und weitergehen"
    stage_4_body: "Schauen Sie auf die gesamte Ausgangslage, nicht nur auf den Preis. Zeitplan, Kette, Finanzierungsreife und Flexibilität zählen mit, bevor Sie die Rechtsberatung einschalten."
    marketing_eyebrow: "Immobilie vermarkten"
    marketing_title: "Wie starke Immobilienvermarktung tatsächlich aussieht"
    marketing_intro: "Gute Vermarktung bedeutet nicht, die Immobilie größer wirken zu lassen, als sie ist. Es geht darum, dass die richtige Käufer- oder Mietergruppe das Objekt schnell versteht und dem vertraut, was sie sieht."
    marketing_card_1_title: "Einen Angebotspreis festsetzen, den Sie erklären können"
    marketing_card_1_body: "Nutzen Sie aktuelle Verkaufsnachweise, vergleichbare aktive Inserate und den Zustand des Hauses. Eine realistische Zahl erzeugt meist bessere Dynamik als ein zu hoher Preis, der sofort wieder gesenkt werden muss."
    marketing_card_2_title: "Das Zuhause vor den Fotos vorbereiten"
    marketing_card_2_body: "Freie Sichtachsen, natürliches Licht und ordentliche Räume sind wichtiger als übermäßiges Staging. Ziel ist, Raum, Grundriss und Zustand auf den ersten Blick verständlich zu machen."
    marketing_card_3_title: "Das Inserat um echte Käuferfragen herum schreiben"
    marketing_card_3_body: "Schreiben Sie, was Menschen wirklich wissen müssen: Grundriss, Außenfläche, Parken, Stauraum, jüngste Verbesserungen, noch nötige Arbeiten und was die Lage im Alltag praktisch macht."
    marketing_card_4_title: "Die Anzeige aktuell halten, sobald sie live ist"
    marketing_card_4_body: "Wenn sich Preis, Fotos oder Besichtigungsverfügbarkeit ändern, aktualisieren Sie das Inserat schnell. Frische und korrekte Informationen helfen ernsthaften Anfragen, weiterzugehen."
    pricing_badge: "Hinweis zur Preisgestaltung"
    pricing_title: "Mit Fakten statt Wunschdenken arbeiten"
    pricing_body: "Verkaufspreise aus dem Register, vergleichbare aktive Inserate und ehrliche Zustandsnotizen sind ein besserer Startpunkt als die Zahl, die Sie gern erreichen würden."
    publish_badge: "Vor der Veröffentlichung"
    publish_title: "Fünf Prüfungen, die sich zuerst lohnen"
    publish_check_1: "Nehmen Sie das Foto, das die Immobilie am besten erklärt, statt standardmäßig einfach die Haustür."
    publish_check_2: "Stellen Sie sicher, dass der Preis nah genug am Markt liegt, um frühe Aufmerksamkeit zu gewinnen."
    publish_check_3: "Seien Sie klar bei Zimmerzahl, Außenfläche, Parken, Stauraum und offensichtlichen Kompromissen."
    publish_check_4: "Bieten Sie Besichtigungszeiten an, die Sie realistisch einhalten können, damit Anfragen nicht kalt werden."
    publish_check_5: "Wissen Sie vorab, wie Sie Fragen zu Eigentumsform, Servicegebühr, Kettenstatus oder Umzugstermin beantworten."
    agency_note_badge: "Praktischer Hinweis"
    agency_note_title: "Wenn noch ein anderer Makler beteiligt ist"
    agency_note_body: "Lesen Sie die Vereinbarung sorgfältig. Begriffe wie Alleinauftrag und exklusives Verkaufsrecht können beeinflussen, ob eine Provision fällig wird, selbst wenn der spätere Käufer oder Mieter die Immobilie zuerst woanders entdeckt."
    playbook_eyebrow: "Praktischer Leitfaden"
    playbook_title: "So vermarkten Sie Ihr Zuhause gut"
    playbook_intro: "Starke Vermarktung hat nichts mit Übertreibung zu tun. Es geht darum, dass die richtige Person das Zuhause schnell versteht, den Angaben vertraut und weiß, was als Nächstes zu tun ist."
    playbook_step_1_title: "1. Das Zuhause fotobereit machen"
    playbook_step_1_body: "Ziel ist nicht, das Zuhause anders wirken zu lassen. Es soll vielmehr so wirken, dass Raum, Grundriss und Zustand in wenigen Sekunden lesbar sind."
    playbook_step_1_point_1: "Öffnen Sie Vorhänge, schalten Sie bei Bedarf Lampen ein und fotografieren Sie bei sauberem natürlichem Licht."
    playbook_step_1_point_2: "Entfernen Sie sichtbare Unordnung, Mülleimer, Wäscheständer und alles, was die Raumgröße schwer einschätzbar macht."
    playbook_step_1_point_3: "Wählen Sie das stärkste Aufmacherbild, nicht nur das naheliegendste."
    playbook_step_2_title: "2. Das Inserat um echte Fragen herum schreiben"
    playbook_step_2_body: "Gute Texte beantworten meist das, was jemand bei einer ersten Besichtigung fragen würde, statt sich auf leere Verkaufssprache zu stützen."
    playbook_step_2_point_1: "Beschreiben Sie den Grundriss ehrlich: Wohnküche, separates Arbeitszimmer, ausgebauter Dachraum, Balkon, Garten, Parken oder gemeinsamer Zugang."
    playbook_step_2_point_2: "Erklären Sie, warum das Zuhause im Alltag funktioniert, statt alles als atemberaubend, einzigartig oder unverzichtbar zu bezeichnen."
    playbook_step_2_point_3: "Wenn der Preis Aktualisierungsbedarf, eine kürzere Laufzeit oder einen anderen Kompromiss berücksichtigt, benennen Sie das klar genug für ernsthafte Interessenten."
    playbook_step_3_title: "3. Anfragen und Besichtigungen sauber handhaben"
    playbook_step_3_body: "Schnelle, ruhige Nachverfolgung hält gute Leads warm und zeigt Ihnen, wo das Inserat noch verbessert werden muss."
    playbook_step_3_point_1: "Antworten Sie, solange die Immobilie im Kopf der anfragenden Person noch präsent ist."
    playbook_step_3_point_2: "Bieten Sie realistische Verfügbarkeiten an, statt zu viel zu versprechen und später zu verschieben."
    playbook_step_3_point_3: "Notieren Sie wiederkehrende Fragen, damit Sie das Inserat schärfen und bessere Antworten vorbereiten können."
    playbook_step_4_title: "4. Feedback und Angebote sinnvoll nutzen"
    playbook_step_4_body: "Der beste nächste Schritt nach einer Besichtigung ist meist eine kurze, nützliche Rückmeldung statt Druck."
    playbook_step_4_point_1: "Fragen Sie, was den Besucher zurückgehalten hat: Preis, Raumgrößen, nötige Arbeiten oder Lage."
    playbook_step_4_point_2: "Nutzen Sie wiederkehrendes Feedback, um zu entscheiden, ob Fotos, Formulierungen oder Preis angepasst werden sollten."
    playbook_step_4_point_3: "Vergleichen Sie Angebote nicht nur nach der Höhe, sondern auch nach Umsetzbarkeit und Verlässlichkeit."
    timeline_eyebrow: "Besichtigungen und Angebote"
    timeline_title: "Was passiert, sobald das Zuhause live ist"
    timeline_intro: "Sobald das Inserat öffentlich ist, geht es weniger um Präsentation und mehr um Tempo, Klarheit und konsequente Nachverfolgung."
    timeline_1_badge: "01 Start"
    timeline_1_title: "Mit den Grundlagen richtig live gehen"
    timeline_1_body: "Starten Sie mit starken Fotos, ehrlichen Raumangaben und realistischer Besichtigungsverfügbarkeit."
    timeline_2_badge: "02 Anfragen"
    timeline_2_title: "Fragen beantworten und Interesse qualifizieren"
    timeline_2_body: "Wenn dieselbe Unklarheit immer wieder auftaucht, verbessern Sie das Inserat, statt das gleiche Thema Nachricht für Nachricht zu wiederholen."
    timeline_3_badge: "03 Besichtigungen"
    timeline_3_title: "Besichtigungen einfach und nützlich halten"
    timeline_3_body: "Bieten Sie Termine an, die Sie einhalten können, erscheinen Sie vorbereitet und halten Sie Feedback fest, solange es noch frisch ist."
    timeline_4_badge: "04 Angebote"
    timeline_4_title: "Die gesamte Position vergleichen"
    timeline_4_body: "Der Preis ist wichtig, aber ebenso Kettenstatus, Finanzierungsreife, Flexibilität und wie schnell Käufer oder Mieter tatsächlich weitergehen können."
    timeline_5_badge: "05 Rechtliche Phase"
    timeline_5_title: "Saubere Übergabe an die Rechtsberatung"
    timeline_5_body: "Sobald Konditionen vereinbart sind, geht die Sache weiterhin an einen Solicitor oder zugelassenen Conveyancer. Klare Unterlagen machen diese Übergabe deutlich einfacher."
    finish_eyebrow: "Nach der Einigung"
    finish_title: "Vermarktung bringt Interesse. Saubere Unterlagen helfen beim Abschluss."
    finish_body: "GotTheKeys soll Eigentümern helfen, Inserate aktuell zu halten, Besichtigungen zu organisieren und mit weniger Verwirrung und weniger verschwendeter Zeit in die rechtliche Phase überzugehen."
    finish_primary_cta: "Konto erstellen"
    finish_secondary_cta: "Mit uns sprechen"

