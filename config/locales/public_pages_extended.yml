fr:
  legal:
    header: "Mentions légales"
    blurb: "Un résumé clair des principales conditions et responsabilités qui s'appliquent lorsque vous utilisez le site."
    paragraph_1: "Les informations publiées sur GotTheKeys visent à aider à commercialiser des biens immobiliers et à soutenir la communication entre propriétaires, acheteurs, locataires et administrateurs. Il s'agit d'un service pratique, non d'un conseil juridique, fiscal, hypothécaire ou de conveyancing."
    paragraph_2: "Si vous créez un compte ou publiez une annonce, vous êtes responsable de l'exactitude, de l'actualité et de la légalité des informations soumises. Cela comprend le prix, les photographies, les descriptions, la disponibilité et toute affirmation sur l'état du bien."
    paragraph_3: "Nous faisons de notre mieux pour garder le site disponible et les informations claires, mais nous ne pouvons pas promettre un service ininterrompu ni garantir que chaque résultat de recherche, demande ou message sera reçu instantanément. La maintenance, les différences entre navigateurs et les problèmes de réseau tiers peuvent affecter la disponibilité."
    paragraph_4: "L'ensemble des contenus, de la marque et du logiciel de ce site reste protégé par les lois applicables sur la propriété intellectuelle. Vous pouvez utiliser le site pour parcourir, demander des informations et gérer des annonces légitimes, mais pas pour aspirer des données à grande échelle, détourner des comptes ou republier du contenu sans autorisation."
    paragraph_5: "Si vous décidez de faire une offre, de louer ou d'acheter un bien, vous devez prendre vos propres conseils professionnels avant de vous engager. Les contrats, vérifications de titre, expertises, financement et modalités de finalisation restent en dehors du champ du site et relèvent des parties concernées."
