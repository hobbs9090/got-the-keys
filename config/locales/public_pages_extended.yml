de:
  legal:
    header: "Rechtliches"
    blurb: "Eine leicht verständliche Zusammenfassung der wichtigsten Bedingungen und Verantwortlichkeiten, die bei der Nutzung der Website gelten."
    paragraph_1: "Die Informationen auf GotTheKeys dienen dazu, die Vermarktung von Immobilien und die Kommunikation zwischen Eigentümern, Käufern, Mietern und Administratoren zu unterstützen. Sie sind als praktischer Dienst gedacht, nicht als Rechts-, Steuer-, Finanzierungs- oder Conveyancing-Beratung."
    paragraph_2: "Wenn Sie ein Konto anlegen oder ein Inserat veröffentlichen, sind Sie dafür verantwortlich, dass die eingereichten Angaben korrekt, aktuell und rechtmäßig veröffentlichbar sind. Dazu gehören Preis, Fotos, Beschreibungen, Verfügbarkeit und Aussagen zum Zustand der Immobilie."
    paragraph_3: "Wir bemühen uns, die Website verfügbar zu halten und Informationen klar darzustellen, können aber keinen unterbrechungsfreien Betrieb versprechen oder garantieren, dass jedes Suchergebnis, jede Anfrage oder jede Nachricht sofort ankommt. Geplante Wartung, Browser-Unterschiede und Drittanbieter-Netzwerke können die Verfügbarkeit beeinflussen."
    paragraph_4: "Alle Inhalte, Marken und die Software dieser Website bleiben durch das geltende Immaterialgüterrecht geschützt. Sie dürfen die Website nutzen, um reale Inserate anzusehen, Anfragen zu senden und zu verwalten, aber nicht, um Daten massenhaft auszulesen, Konten zu missbrauchen oder Inhalte ohne Genehmigung erneut zu veröffentlichen."
    paragraph_5: "Wenn Sie ein Angebot abgeben, eine Immobilie mieten oder kaufen möchten, sollten Sie vor einer verbindlichen Entscheidung eigenen fachlichen Rat einholen. Verträge, Eigentumsprüfungen, Gutachten, Finanzierung und Abwicklung liegen außerhalb des Umfangs der Website und bleiben Sache der beteiligten Parteien."
    summary_badge: "Kurzüberblick"
    summary_count: "wichtige Rechtspunkte"
    quick_guide_label: "Kurzanleitung"
    quick_guide_title: "Nutzen Sie die Website mit klaren Erwartungen"
    quick_guide_body: "Die Plattform hilft bei der Darstellung von Immobilien und beim Kommunikationsablauf, aber rechtliche und fachliche Entscheidungen liegen weiterhin bei den beteiligten Parteien."
    quick_guide_item_1_title: "Inseratsangaben korrekt halten"
    quick_guide_item_1_body: "Preise, Beschreibungen, Fotos und Verfügbarkeiten sollten aktuell und rechtmäßig sein."
    quick_guide_item_2_title: "Mit vernünftigem Service rechnen, nicht mit Garantien"
    quick_guide_item_2_body: "Wir arbeiten daran, die Plattform verfügbar zu halten, aber Wartung und Netzwerkprobleme können sie dennoch beeinträchtigen."
    quick_guide_item_3_title: "Vor einer Zusage Beratung einholen"
    quick_guide_item_3_body: "Angebote, Verträge, Gutachten, Finanzierung und Abwicklung benötigen weiterhin unabhängige fachliche Unterstützung."
    contact_title: "Brauchen Sie etwas Konkreteres?"
    contact_body: "Wenn Ihre Frage über diese Zusammenfassung hinausgeht, senden Sie uns eine allgemeine Anfrage, und wir zeigen Ihnen den passenden nächsten Schritt."
    contact_action: "Team kontaktieren"
    sections:
      scope:
        tab: "Zweck"
        eyebrow: "Leistungsumfang"
        title: "Wofür die Plattform gedacht ist"
      responsibilities:
        tab: "Ihre Inserate"
