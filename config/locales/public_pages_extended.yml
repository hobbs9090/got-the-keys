    essential_body: "Nécessaires pour la connexion, la sécurité de session, le choix de langue et d'autres comportements centraux du site."
    optional_title: "Analyses optionnelles"
    optional_body: "Uniquement pour mesurer l'usage et améliorer le service. Elles restent désactivées tant que vous n'avez pas explicitement accepté."
    preference_title: "Préférence de consentement"
    status_title: "Choix actuel de ce navigateur"
    status_body: "Dans ce déploiement, les analyses optionnelles sont bloquées par défaut. Votre choix enregistré indique seulement si vous autoriseriez des cookies non essentiels s'ils étaient activés plus tard."
    current_status_pending: "Choix encore nécessaire"
    current_status_essential: "Cookies essentiels uniquement"
    current_status_all: "Cookies optionnels acceptés"
    settings_eyebrow: "Gérer le consentement"
    settings_title: "Choisissez ce que ce navigateur autorise"
    settings_body: "Refuser les cookies non essentiels laisse actifs uniquement les cookies centraux du site. Tout accepter enregistre aussi le consentement pour les analyses optionnelles."
    settings_note: "Vous pouvez revenir à cette page à tout moment depuis le pied de page pour modifier votre choix."
    card_essential_eyebrow: "Toujours actifs"
    card_essential_body: "Cela couvre le cookie de session Rails, l'état de connexion sécurisé et la continuité langue/session. Sans eux, les fonctions principales du site cessent de fonctionner."
    card_preference_eyebrow: "Stockage de préférence"
    card_preference_body: "Nous enregistrons un petit cookie de préférence afin que le site se souvienne si ce navigateur a accepté ou refusé les cookies non essentiels."
    card_optional_eyebrow: "Désactivés par défaut"
    card_optional_body: "Nous ne chargeons aucun cookie d'analyse optionnel avant consentement. Si des analyses sont ajoutées plus tard, ce contrôle déterminera si elles sont autorisées ou bloquées."
    summary_eyebrow: "En résumé"
    summary_title: "L'essentiel"
    summary_item_1_title: "L'essentiel reste activé"
    summary_item_1_body: "Les cookies liés à la sécurité, à la session et à la langue sont considérés comme nécessaires au service."
    summary_item_2_title: "Refuser est aussi simple qu'accepter"
    summary_item_2_body: "La bannière propose les deux choix immédiatement, sans pousser vers une seule action positive."
    summary_item_3_title: "Vous pouvez changer plus tard"
    summary_item_3_body: "Utilisez le lien des paramètres de cookies dans le pied de page pour revoir ce choix pour ce navigateur."
    browser_eyebrow: "Contrôles du navigateur"
    browser_title: "Vous pouvez aussi gérer les cookies dans votre navigateur"
    browser_body: "Les paramètres du navigateur peuvent supprimer les cookies enregistrés ou les bloquer totalement, même si bloquer les cookies essentiels peut empêcher le fonctionnement normal de la connexion et des formulaires."
    browser_note: "Nous désactivons également la persistance sessionStorage non essentielle utilisée par l'assistant de saisie Foundation lorsqu'elle n'est pas strictement nécessaire."

  how_it_works:
    hero_title: "Comment commercialiser votre bien avec plus de clarté et moins de discours creux"
    hero_body: "Une bonne commercialisation immobilière est généralement simple : fixer un prix réaliste, présenter le bien honnêtement, répondre aux vraies questions des acheteurs et locataires, puis garder de l'élan une fois les demandes arrivées. Cette page montre comment faire, et où GotTheKeys s'insère dans le processus."
    primary_cta: "Créer votre compte"
    secondary_cta: "Voir le guide marketing"
    hero_badge: "Marketing piloté par le propriétaire"
    hero_panel_title: "À quoi sert cette page"
    hero_panel_body: "Un guide pratique sur le prix, la présentation, les demandes, les visites, les offres et le relais juridique."
    hero_point_1: "Fixez un prix que vous pouvez justifier avec des éléments concrets."
    hero_point_2: "Rédigez une annonce qui répond aux vraies questions des acheteurs."
    hero_point_3: "Gardez les visites, retours et prochaines étapes en mouvement."
    jump_nav_label: "Sections de la page Fonctionnement"
    jump_tab_process: "Le processus"
    jump_tab_marketing: "Commercialiser votre bien"
    jump_tab_viewings: "Visites et offres"
    jump_tab_finish: "Après l'accord"
    process_eyebrow: "Le processus"
    process_title: "Un chemin plus simple entre l'annonce et des conditions convenues"
    process_intro: "La plateforme est conçue pour aider les propriétaires à garder la main sur le marketing et la communication, tout en faisant appel à un solicitor ou à un conveyancer agréé lorsque l'étape juridique commence."
    stage_1_title: "Préparer et fixer le prix"
    stage_1_body: "Commencez par les ventes comparables, la concurrence actuelle et une vision réaliste de l'état du bien. L'objectif est de générer un vrai intérêt précoce, pas de tester le marché pendant des mois."
    stage_2_title: "Présenter correctement le bien"
    stage_2_body: "De bonnes photos, une description honnête et des informations claires sur les pièces valent généralement mieux qu'un texte exagéré et des promesses vagues."
    stage_3_title: "Gérer les demandes et les visites"
    stage_3_body: "Répondez rapidement, proposez des disponibilités réalistes et notez les questions fréquentes pour améliorer l'annonce et vous concentrer sur l'intérêt sérieux."
    stage_4_title: "Évaluer les offres et avancer"
    stage_4_body: "Regardez l'ensemble de la situation, pas seulement le prix. Le calendrier, la chaîne, la préparation du financement et la flexibilité comptent aussi avant d'instruire l'équipe juridique."
    marketing_eyebrow: "Commercialiser votre bien"
    marketing_title: "À quoi ressemble vraiment une bonne commercialisation immobilière"
    marketing_intro: "Un bon marketing ne consiste pas à faire paraître le bien plus grand qu'il ne l'est. Il s'agit d'aider le bon acheteur ou locataire à comprendre rapidement le bien et à faire confiance à ce qu'il voit."
    marketing_card_1_title: "Fixer un prix affiché que vous pouvez expliquer"
    marketing_card_1_body: "Utilisez les ventes récentes, les annonces concurrentes en ligne et l'état actuel du bien. Un chiffre réaliste crée généralement une meilleure dynamique qu'un prix ambitieux qui doit être baissé aussitôt."
    marketing_card_2_title: "Préparer le bien avant les photos"
    marketing_card_2_body: "Des lignes de vue dégagées, de la lumière naturelle et des pièces ordonnées comptent plus qu'une mise en scène excessive. Le but est de rendre l'espace, le plan et l'état faciles à comprendre d'un coup d'œil."
    marketing_card_3_title: "Rédiger l'annonce autour des vraies questions"
    marketing_card_3_body: "Dites ce que les gens ont vraiment besoin de savoir : distribution, espace extérieur, stationnement, rangement, améliorations récentes, travaux encore nécessaires et ce qui rend l'emplacement pratique au quotidien."
    marketing_card_4_title: "Garder l'annonce à jour une fois publiée"
    marketing_card_4_body: "Si le prix change, si les photos s'améliorent ou si les disponibilités de visite évoluent, mettez rapidement l'annonce à jour. Des informations fraîches et exactes aident les demandes sérieuses à continuer."
    pricing_badge: "Note sur le prix"
    pricing_title: "Appuyez-vous sur des preuves, pas sur l'espoir"
    pricing_body: "Les prix vendus au registre, les annonces concurrentes en ligne et des notes honnêtes sur l'état du bien sont un meilleur point de départ que le chiffre que vous aimeriez obtenir."
    publish_badge: "Avant de publier"
    publish_title: "Cinq vérifications utiles à faire d'abord"
    publish_check_1: "Mettez en avant la photo qui explique le mieux le bien, et pas automatiquement la porte d'entrée."
    publish_check_2: "Assurez-vous que le prix est suffisamment proche du marché pour capter l'attention tôt."
    publish_check_3: "Soyez clair sur le nombre de pièces, l'extérieur, le stationnement, le rangement et les compromis évidents."
    publish_check_4: "Proposez des créneaux de visite que vous pouvez réellement honorer pour éviter que les demandes refroidissent."
    publish_check_5: "Sachez à l'avance comment répondre aux questions sur le titre, les charges, la chaîne ou la date de déménagement."
    agency_note_badge: "Note pratique"
    agency_note_title: "Si une autre agence est impliquée"
    agency_note_body: "Lisez attentivement le contrat. Des notions comme le mandat exclusif ou les droits de vente exclusifs peuvent influencer le paiement d'une commission, même si l'acheteur ou le locataire final a découvert le bien ailleurs."
    playbook_eyebrow: "Guide pratique"
    playbook_title: "Comment bien commercialiser votre bien"
    playbook_intro: "Un bon marketing n'est pas une question d'exagération. Il s'agit de permettre à la bonne personne de comprendre le bien rapidement, de faire confiance aux détails et de savoir quoi faire ensuite."
    playbook_step_1_title: "1. Rendre le bien prêt pour les photos"
    playbook_step_1_body: "Le but n'est pas de donner au bien une autre apparence. Il s'agit de rendre l'espace, la distribution et l'état lisibles en quelques secondes."
    playbook_step_1_point_1: "Ouvrez les rideaux, allumez les lampes si nécessaire et photographiez lorsque les pièces bénéficient d'une lumière naturelle propre."
    playbook_step_1_point_2: "Retirez le désordre visible, les poubelles, étendoirs et tout ce qui rend les volumes difficiles à juger."
    playbook_step_1_point_3: "Choisissez l'image d'ouverture la plus forte, pas simplement la plus évidente."
    playbook_step_2_title: "2. Rédiger l'annonce autour des vraies questions"
    playbook_step_2_body: "Un bon texte répond généralement à ce qu'une personne demanderait lors d'une première visite, plutôt que de s'appuyer sur un langage commercial vide."
    playbook_step_2_point_1: "Décrivez honnêtement la distribution : cuisine ouverte, bureau séparé, pièce sous combles, balcon, jardin, stationnement ou accès partagé."
    playbook_step_2_point_2: "Expliquez pourquoi le bien fonctionne au quotidien au lieu de tout qualifier d'exceptionnel, unique ou incontournable."
    playbook_step_2_point_3: "Si le prix tient compte de travaux, d'un bail plus court ou d'un autre compromis, dites-le assez clairement pour les acheteurs sérieux."
    playbook_step_3_title: "3. Bien traiter les demandes et les visites"
    playbook_step_3_body: "Un suivi rapide et calme garde les bons leads actifs et vous aide à repérer ce qui doit encore être amélioré dans l'annonce."
    playbook_step_3_point_1: "Répondez pendant que le bien est encore frais dans l'esprit de la personne qui a demandé."
    playbook_step_3_point_2: "Proposez des disponibilités réalistes au lieu de promettre trop puis de replanifier."
    playbook_step_3_point_3: "Gardez des notes sur les questions récurrentes pour affiner l'annonce et mieux préparer vos réponses."
    playbook_step_4_title: "4. Utiliser les retours et les offres intelligemment"
    playbook_step_4_body: "Après une visite, l'étape la plus utile est souvent un court suivi pertinent plutôt qu'une pression inutile."
    playbook_step_4_point_1: "Demandez ce qui a freiné le visiteur : le prix, la taille des pièces, les travaux nécessaires ou l'emplacement."
    playbook_step_4_point_2: "Utilisez les retours récurrents pour décider si les photos, les formulations ou le prix doivent être ajustés."
    playbook_step_4_point_3: "Comparez les offres sur leur niveau de préparation et leur fiabilité autant que sur le montant affiché."
    timeline_eyebrow: "Visites et offres"
    timeline_title: "Ce qui se passe une fois le bien publié"
    timeline_intro: "Une fois l'annonce publique, le travail concerne moins la présentation que le rythme, la clarté et le suivi."
    timeline_1_badge: "01 Lancement"
    timeline_1_title: "Publier avec les bases bien en place"
    timeline_1_body: "Mettez en ligne avec de bonnes photos, des détails honnêtes sur les pièces et des créneaux réalistes dès le départ."
    timeline_2_badge: "02 Demandes"
    timeline_2_title: "Répondre aux questions et qualifier l'intérêt"
    timeline_2_body: "Si la même confusion revient sans cesse, améliorez l'annonce plutôt que de répéter la même réponse à chaque message."
    timeline_3_badge: "03 Visites"
    timeline_3_title: "Garder les visites simples et utiles"
    timeline_3_body: "Proposez des horaires que vous pouvez tenir, arrivez préparé et notez les retours tant qu'ils sont encore frais."
    timeline_4_badge: "04 Offres"
    timeline_4_title: "Comparer la situation dans son ensemble"
    timeline_4_body: "Le prix compte, mais aussi la chaîne, la préparation du financement, la flexibilité et la vitesse réelle à laquelle l'acheteur ou le locataire peut avancer."
    timeline_5_badge: "05 Étape juridique"
    timeline_5_title: "Transmettre proprement au conseil juridique"
    timeline_5_body: "Une fois les conditions convenues, le dossier passe toujours à un solicitor ou à un conveyancer agréé. Des dossiers clairs rendent cette transmission bien plus simple."
    finish_eyebrow: "Après l'accord"
    finish_title: "Le marketing crée l'intérêt. Des dossiers clairs aident à conclure."
    finish_body: "GotTheKeys est conçu pour aider les propriétaires à garder leur annonce à jour, organiser les visites et passer à l'étape juridique avec moins de confusion et moins de temps perdu."
    finish_primary_cta: "Créer votre compte"
    finish_secondary_cta: "Nous contacter"

