it:
  legal:
    header: "Note legali"
    blurb: "Un riepilogo chiaro dei principali termini e delle responsabilità che si applicano quando utilizzi il sito."
    paragraph_1: "Le informazioni pubblicate su GotTheKeys servono a supportare la promozione degli immobili e la comunicazione tra proprietari, acquirenti, inquilini e amministratori. Sono pensate come un servizio pratico, non come consulenza legale, fiscale, ipotecaria o di conveyancing."
    paragraph_2: "Se crei un account o pubblichi un annuncio, sei responsabile del fatto che i dettagli inviati siano accurati, aggiornati e legalmente pubblicabili. Questo include prezzo, fotografie, descrizioni, disponibilità e qualsiasi dichiarazione sullo stato dell'immobile."
    paragraph_3: "Ci impegniamo a mantenere il sito disponibile e le informazioni chiare, ma non possiamo promettere un servizio ininterrotto né garantire che ogni risultato di ricerca, richiesta o messaggio venga ricevuto immediatamente. Manutenzione programmata, differenze tra browser e problemi di rete di terze parti possono incidere sulla disponibilità."
    paragraph_4: "Tutti i contenuti, il marchio e il software di questo sito restano protetti dalle leggi applicabili sulla proprietà intellettuale. Puoi usare il sito per consultare, richiedere informazioni e gestire annunci legittimi, ma non per estrarre dati su larga scala, abusare degli account o ripubblicare contenuti senza permesso."
    paragraph_5: "Se intendi fare un'offerta, affittare o acquistare un immobile, dovresti ottenere una consulenza professionale indipendente prima di impegnarti. Contratti, verifiche di titolo, perizie, finanziamento e completamento sono fuori dall'ambito del sito e restano responsabilità delle parti coinvolte."
    summary_badge: "In sintesi"
    summary_count: "punti legali chiave"
    quick_guide_label: "Guida rapida"
    quick_guide_title: "Usa il sito con aspettative chiare"
    quick_guide_body: "La piattaforma aiuta a presentare l'immobile e a gestire la comunicazione, ma le decisioni legali e professionali restano in capo alle parti coinvolte."
    quick_guide_item_1_title: "Mantieni accurati i dettagli dell'annuncio"
    quick_guide_item_1_body: "Prezzi, descrizioni, fotografie e disponibilità devono restare aggiornati e leciti."
    quick_guide_item_2_title: "Aspettati un servizio ragionevole, non garanzie"
    quick_guide_item_2_body: "Lavoriamo per mantenere la piattaforma disponibile, ma manutenzione e problemi di rete possono comunque incidere."
    quick_guide_item_3_title: "Chiedi consulenza prima di impegnarti"
    quick_guide_item_3_body: "Offerte, contratti, perizie, finanziamento e conveyancing richiedono ancora un supporto professionale indipendente."
    contact_title: "Hai bisogno di qualcosa di più specifico?"
    contact_body: "Se la tua domanda va oltre questo riepilogo, inviaci una richiesta generale e ti indirizzeremo verso il passo successivo più adatto."
