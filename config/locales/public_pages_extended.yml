    quick_guide_title: "Utilisez le site avec des attentes claires"
    quick_guide_body: "La plateforme aide à présenter un bien et à gérer la communication, mais les décisions juridiques et professionnelles restent entre les mains des parties concernées."
    quick_guide_item_1_title: "Gardez les détails de l'annonce exacts"
