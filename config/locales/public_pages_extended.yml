  cookie_policy:
    header: "Informativa sui cookie"
    hero_eyebrow: "Controlli privacy"
    hero_body: "Questo sito utilizza cookie essenziali per far funzionare accesso, moduli e preferenze di lingua. Le analisi opzionali restano disattivate finché non dai un consenso chiaro, e puoi rivedere questa scelta qui in qualsiasi momento."
    banner_eyebrow: "Scelte sui cookie"
    banner_title: "Usiamo cookie per far funzionare correttamente il sito"
    banner_body: "I cookie essenziali restano attivi perché supportano l'accesso sicuro, i moduli e la navigazione di base. Le analisi opzionali restano disattivate finché non le autorizzi esplicitamente."
    banner_hint_html: "Puoi leggere la policy completa o modificare la tua scelta più tardi nella <a href='%{policy_path}'>pagina delle impostazioni cookie</a>."
    manage_preferences: "Impostazioni cookie"
    accept_all: "Accetta tutto"
    reject_non_essential: "Rifiuta i non essenziali"
    essential_title: "Cookie essenziali"
    essential_body: "Necessari per accesso, sicurezza della sessione, scelta della lingua e altri comportamenti centrali del sito."
    optional_title: "Analisi opzionali"
    optional_body: "Solo per misurare l'utilizzo e migliorare il servizio. Restano disattivate finché non le accetti esplicitamente."
    preference_title: "Preferenza di consenso"
    status_title: "Scelta attuale del browser"
    status_body: "In questa installazione le analisi opzionali restano bloccate per impostazione predefinita. La scelta salvata registra solo se autorizzeresti i cookie non essenziali qualora venissero attivati in seguito."
    current_status_pending: "Scelta ancora necessaria"
    current_status_essential: "Solo cookie essenziali"
    current_status_all: "Cookie opzionali accettati"
    settings_eyebrow: "Gestisci il consenso"
    settings_title: "Scegli cosa consente questo browser"
    settings_body: "Rifiutare i cookie non essenziali mantiene attivi solo i cookie fondamentali del sito. Accettare tutto registra anche il consenso alle analisi opzionali."
    settings_note: "Puoi tornare in qualsiasi momento a questa pagina dal footer per aggiornare la tua scelta."
    card_essential_eyebrow: "Sempre attivi"
    card_essential_body: "Questi includono il cookie di sessione Rails, lo stato di accesso sicuro e la continuità di lingua e sessione. Senza di essi le parti principali del sito smettono di funzionare."
    card_preference_eyebrow: "Memorizzazione preferenza"
    card_preference_body: "Memorizziamo un piccolo cookie di preferenza così il sito ricorda se questo browser ha accettato o rifiutato i cookie non essenziali."
    card_optional_eyebrow: "Disattivati di default"
    card_optional_body: "Non carichiamo cookie analitici opzionali fino a quando non viene dato il consenso. Se in futuro verranno aggiunte analisi, questo controllo determinerà se sono consentite o bloccate."
    summary_eyebrow: "In sintesi"
    summary_title: "Cosa conta di più"
    summary_item_1_title: "Gli essenziali restano attivi"
    summary_item_1_body: "I cookie relativi a sicurezza, sessione e lingua sono trattati come necessari per il servizio."
    summary_item_2_title: "Rifiutare è facile quanto accettare"
    summary_item_2_body: "Il banner offre entrambe le opzioni fin da subito, senza spingere verso una sola azione positiva."
    summary_item_3_title: "Puoi cambiare idea dopo"
    summary_item_3_body: "Usa il link alle impostazioni cookie nel footer per rivedere la scelta per questo browser."
    browser_eyebrow: "Controlli del browser"
    browser_title: "Puoi gestire i cookie anche dal browser"
    browser_body: "Le impostazioni del browser possono rimuovere i cookie memorizzati o bloccarli del tutto, anche se bloccare i cookie essenziali può impedire il corretto funzionamento di accesso e moduli."
    browser_note: "Disattiviamo anche la persistenza sessionStorage non essenziale usata dall'helper di input di Foundation quando non è strettamente necessaria."

  how_it_works:
    hero_title: "Come promuovere la tua casa con più chiarezza e meno frasi vuote"
    hero_body: "Un buon marketing immobiliare di solito è semplice: dare un prezzo realistico, presentare l'immobile con onestà, rispondere alle vere domande di acquirenti e inquilini e mantenere slancio quando arrivano le richieste. Questa pagina mostra come farlo e dove GotTheKeys si inserisce nel processo."
    primary_cta: "Crea il tuo account"
    secondary_cta: "Vedi la guida marketing"
    hero_badge: "Marketing guidato dal proprietario"
    hero_panel_title: "A cosa serve questa pagina"
    hero_panel_body: "Una guida pratica su prezzo, presentazione, richieste, visite, offerte e passaggio alla fase legale."
    hero_point_1: "Definisci un prezzo che puoi sostenere con dati concreti."
    hero_point_2: "Scrivi un annuncio che risponda alle vere domande degli acquirenti."
    hero_point_3: "Mantieni in movimento visite, feedback e passi successivi."
    jump_nav_label: "Sezioni della pagina Come funziona"
    jump_tab_process: "Il processo"
    jump_tab_marketing: "Promuovi la tua casa"
    jump_tab_viewings: "Visite e offerte"
    jump_tab_finish: "Dopo l'accordo"
    process_eyebrow: "Il processo"
    process_title: "Un percorso più semplice dall'annuncio ai termini concordati"
    process_intro: "La piattaforma è pensata per aiutare i proprietari a mantenere il controllo sul marketing e sulla comunicazione, continuando comunque a usare un solicitor o un conveyancer abilitato quando inizia la fase legale."
    stage_1_title: "Preparare e prezzare"
    stage_1_body: "Inizia da vendite comparabili, concorrenza attuale e una visione realistica delle condizioni. L'obiettivo è generare interesse reale fin dall'inizio, non testare il mercato per mesi."
    stage_2_title: "Presentare bene la casa"
    stage_2_body: "Foto forti, una descrizione onesta e informazioni chiare sugli ambienti di solito funzionano meglio di testi esagerati e promesse vaghe."
    stage_3_title: "Gestire richieste e visite"
    stage_3_body: "Rispondi rapidamente, offri disponibilità sensate e tieni traccia delle domande ricorrenti così puoi migliorare l'annuncio e concentrarti sull'interesse serio."
    stage_4_title: "Valutare le offerte e andare avanti"
    stage_4_body: "Guarda la situazione nel suo insieme, non solo il prezzo. Tempi, catena, preparazione del mutuo e flessibilità contano tutti prima di coinvolgere il team legale."
    marketing_eyebrow: "Promuovi la tua casa"
    marketing_title: "Che cosa significa davvero fare buon marketing immobiliare"
    marketing_intro: "Un buon marketing non significa far sembrare la casa più grande di ciò che è. Significa aiutare l'acquirente o l'inquilino giusto a capire rapidamente l'immobile e a fidarsi di ciò che vede."
    marketing_card_1_title: "Definire un prezzo richiesto che sai spiegare"
    marketing_card_1_body: "Usa vendite recenti, annunci concorrenti attivi e le condizioni reali della casa. Una cifra realistica crea di solito più slancio di un numero ambizioso che richiede subito una riduzione."
    marketing_card_2_title: "Preparare la casa prima delle foto"
    marketing_card_2_body: "Linee visive pulite, luce naturale e stanze ordinate contano più di un allestimento eccessivo. L'obiettivo è rendere spazio, distribuzione e stato leggibili a colpo d'occhio."
    marketing_card_3_title: "Scrivere l'annuncio intorno alle vere domande"
    marketing_card_3_body: "Spiega ciò che le persone hanno davvero bisogno di sapere: disposizione, spazio esterno, parcheggio, deposito, migliorie recenti, lavori ancora necessari e cosa rende la zona pratica nella vita di tutti i giorni."
    marketing_card_4_title: "Tenere aggiornato l'annuncio una volta pubblicato"
    marketing_card_4_body: "Se cambiano prezzo, foto o disponibilità per le visite, aggiorna rapidamente l'annuncio. Informazioni fresche e accurate aiutano le richieste serie a proseguire."
    pricing_badge: "Nota sul prezzo"
    pricing_title: "Usa prove, non supposizioni ottimistiche"
    pricing_body: "Prezzi di vendita registrati, annunci concorrenti attivi e note oneste sulle condizioni sono un punto di partenza migliore della cifra che vorresti raggiungere."
    publish_badge: "Prima di pubblicare"
    publish_title: "Cinque controlli che vale la pena fare prima"
    publish_check_1: "Apri con la foto che spiega meglio l'immobile, non semplicemente con la porta d'ingresso per abitudine."
    publish_check_2: "Assicurati che il prezzo sia abbastanza vicino al mercato da attirare attenzione fin da subito."
    publish_check_3: "Sii chiaro su numero di stanze, spazi esterni, parcheggio, deposito e compromessi evidenti."
    publish_check_4: "Offri orari di visita che puoi davvero rispettare, così le richieste non si raffreddano."
    publish_check_5: "Preparati a rispondere a domande su titolo di possesso, service charge, posizione nella catena o data di trasferimento."
    agency_note_badge: "Nota pratica"
    agency_note_title: "Se è coinvolta un'altra agenzia"
    agency_note_body: "Leggi con attenzione l'accordo. Termini come incarico esclusivo e diritti esclusivi di vendita possono incidere sul pagamento della commissione, anche se l'acquirente o l'inquilino finale ha trovato il bene da un'altra parte."
    playbook_eyebrow: "Guida pratica"
    playbook_title: "Come promuovere bene la tua casa"
    playbook_intro: "Un marketing forte non riguarda l'esagerazione. Riguarda il permettere alla persona giusta di capire rapidamente la casa, fidarsi dei dettagli e sapere cosa fare dopo."
    playbook_step_1_title: "1. Preparare la casa per le foto"
    playbook_step_1_body: "L'obiettivo non è far sembrare la casa diversa. È rendere spazio, distribuzione e condizioni facili da leggere in pochi secondi."
    playbook_step_1_point_1: "Apri le tende, accendi le luci dove serve e fotografa quando gli ambienti hanno una luce naturale pulita."
    playbook_step_1_point_2: "Rimuovi disordine evidente, cestini, stendini e tutto ciò che rende difficile capire le dimensioni delle stanze."
    playbook_step_1_point_3: "Scegli l'immagine principale più forte, non semplicemente quella più ovvia."
    playbook_step_2_title: "2. Scrivere l'annuncio intorno alle vere domande"
    playbook_step_2_body: "Un buon testo di solito risponde a ciò che una persona chiederebbe durante una prima visita, invece di affidarsi a un linguaggio di vendita vuoto."
    playbook_step_2_point_1: "Descrivi con onestà la distribuzione: cucina abitabile, studio separato, mansarda, balcone, giardino, parcheggio o accesso condiviso."
    playbook_step_2_point_2: "Spiega perché la casa funziona nella vita quotidiana invece di definire tutto straordinario, unico o imperdibile."
    playbook_step_2_point_3: "Se il prezzo riflette lavori da fare, un lease più breve o un altro compromesso, spiegalo con sufficiente chiarezza per gli acquirenti seri."
    playbook_step_3_title: "3. Gestire bene richieste e visite"
    playbook_step_3_body: "Un follow-up rapido e calmo mantiene attivi i contatti buoni e ti aiuta a capire dove l'annuncio deve ancora migliorare."
    playbook_step_3_point_1: "Rispondi mentre l'immobile è ancora fresco nella mente di chi ha scritto."
    playbook_step_3_point_2: "Offri disponibilità realistiche invece di promettere troppo e riprogrammare in seguito."
    playbook_step_3_point_3: "Tieni nota delle domande ricorrenti così puoi affinare l'annuncio e preparare risposte migliori."
    playbook_step_4_title: "4. Usare feedback e offerte in modo intelligente"
    playbook_step_4_body: "Dopo una visita, il passo successivo più utile è di solito un breve follow-up utile, non pressione."
    playbook_step_4_point_1: "Chiedi cosa ha frenato il visitatore: prezzo, dimensioni delle stanze, lavori necessari o posizione."
    playbook_step_4_point_2: "Usa i feedback ricorrenti per decidere se foto, testo o prezzo debbano essere regolati."
    playbook_step_4_point_3: "Confronta le offerte per livello di preparazione e affidabilità, oltre che per la cifra."
    timeline_eyebrow: "Visite e offerte"
    timeline_title: "Cosa succede quando la casa va online"
    timeline_intro: "Una volta che l'annuncio è pubblico, il lavoro riguarda meno la presentazione e più ritmo, chiarezza e continuità."
    timeline_1_badge: "01 Lancio"
    timeline_1_title: "Pubblica con le basi fatte bene"
    timeline_1_body: "Vai online con buone foto, dettagli onesti sugli ambienti e disponibilità realistiche per le visite fin dall'inizio."
    timeline_2_badge: "02 Richieste"
    timeline_2_title: "Rispondere alle domande e qualificare l'interesse"
    timeline_2_body: "Se la stessa confusione riappare continuamente, migliora l'annuncio invece di rispondere allo stesso problema un messaggio alla volta."
    timeline_3_badge: "03 Visite"
    timeline_3_title: "Mantenere le visite semplici e utili"
    timeline_3_body: "Offri orari che puoi rispettare, presentati preparato e registra il feedback finché è ancora fresco."
    timeline_4_badge: "04 Offerte"
    timeline_4_title: "Valutare l'intera posizione"
    timeline_4_body: "La cifra conta, ma anche catena, preparazione del mutuo, flessibilità e rapidità reale con cui acquirente o inquilino possono procedere."
    timeline_5_badge: "05 Fase legale"
    timeline_5_title: "Passare il dossier al team legale in modo pulito"
    timeline_5_body: "Una volta concordati i termini, la pratica passa comunque a un solicitor o a un conveyancer abilitato. Dati e registri chiari rendono questo passaggio molto più semplice."
    finish_eyebrow: "Dopo l'accordo"
    finish_title: "Il marketing crea interesse. Dati chiari aiutano a chiudere."
    finish_body: "GotTheKeys è pensato per aiutare i proprietari a mantenere aggiornato l'annuncio, organizzare le visite e passare alla fase legale con meno confusione e meno tempo sprecato."
    finish_primary_cta: "Crea il tuo account"
    finish_secondary_cta: "Parla con noi"

