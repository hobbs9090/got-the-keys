en:
  date:
    day_names:
      - Sunday
      - Monday
      - Tuesday
      - Wednesday
      - Thursday
      - Friday
      - Saturday
    formats:
      calendar_day: "%a %d %b"
      calendar_heading: "%A, %d %B %Y"
      long: "%A, %d %B %Y"
      shared_date: "%A, %d %B, %Y"
  time:
    formats:
      long: "%A, %d %B %Y at %H:%M"
      shared_time: "%A, %B %d %Y, %H:%M"
      time_only: "%H:%M"

