en:
  date:
    formats:
      calendar_day: "%a %d %b"
      calendar_heading: "%A, %d %B %Y"
      shared_date: "%d %B, %Y"
  time:
    formats:
      long: "%A, %d %B %Y at %H:%M"
      shared_time: "%B %d %Y, %H:%M"
      time_only: "%H:%M"

zh:
  date:
    formats:
      calendar_day: "%m月%d日"
      calendar_heading: "%Y年%m月%d日 %A"
      shared_date: "%Y年%m月%d日"
  time:
    formats:
      long: "%Y年%m月%d日 %H:%M"
      shared_time: "%Y年%m月%d日 %H:%M"
      time_only: "%H:%M"

