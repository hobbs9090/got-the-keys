# About Us
  about_us:
    title: "About Us"
    all_about_us: "It's All About Us"
    blurb: "By doing some of the work, you save on the normal costs"
    paragraph_1: "What If You're Using An Estate Agent Too?"
    paragraph_2: "If you are marketing your home yourself as well as employing an estate agent, you need to be aware of the terms of your contract with the agency. 'Sole agency' means you'll pay the agent's commission ONLY if they find a buyer for your home, but agree to 'sole selling rights' and you'll end up paying them even if you find the buyer. There are grey areas, however. If you find a buyer privately who turns out to be on the books of the estate agents you appointed, they'd have a job proving the sale was as a result of their marketing activity. However, if a buyer knocks at your door as a result of seeing the estate agency sign outside your house and the agents find out, their case for payment is much stronger."
    paragraph_3: "Prosciutto ball tip filet mignon andouille frankfurter chicken rump sausage meatball. Filet mignon meatloaf ground round andouille ham hock pork. Bresaola short loin meatball chuck hamburger pig. Turkey venison chuck, tongue fatback tail swine jerky corned beef shank kielbasa prosciutto ribeye ham tri-tip. Rump bacon pork belly meatloaf shoulder short loin meatball kielbasa pork loin tongue bresaola brisket corned beef jowl prosciutto. Beef ribs shankle short ribs pork belly corned beef fatback pork chop tongue biltong boudin strip steak sirloin meatloaf pancetta."

