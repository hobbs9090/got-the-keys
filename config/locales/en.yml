# Welcome
  welcome:
    title: "Home"
    welcome_message: "Sell Or Let With More Control"
    tool_tip: "Market insight"
    tool_tip_content: "See the kind of pricing and presentation insight that helps owners launch a stronger listing."
    try_today: "Why People Use GotTheKeys"
    paragraph_1: "GotTheKeys helps homeowners and landlords create clear, credible listings without giving away control of the whole process."
    paragraph_2: "Add the essentials, upload photos and floor plans, and respond directly to enquiries so buyers and tenants get timely, accurate information."
    paragraph_3: "Use the site to compare sale and rental stock, judge whether your asking price is realistic, and keep your listing current as the market moves."
    paragraph_4: "From first enquiry to agreed offer, the goal is simple: lower friction, lower cost, and a more straightforward experience for everyone involved."

# Legal
  legal:
    title: "Legal"
    header: "Legal"
    blurb: "A plain-English summary of the key terms and responsibilities that apply when you use the site."
    paragraph_1: "The information on GotTheKeys is provided to help market property and support communication between owners, buyers, tenants, and administrators. It is intended as a practical service, not as legal, tax, mortgage, or conveyancing advice."
    paragraph_2: "If you create an account or publish a listing, you are responsible for making sure the details you submit are accurate, up to date, and lawful to publish. That includes pricing, photographs, descriptions, availability, and any statements about the condition of the property."
    paragraph_3: "We aim to keep the site available and the information presented clearly, but we cannot promise uninterrupted service or guarantee that every search result, enquiry, or message will be received instantly. Planned maintenance, browser differences, and third-party network issues can affect availability."
    paragraph_4: "All content, branding, and software on this site remain protected by applicable intellectual property law. You may use the site to browse, enquire, and manage legitimate listings, but not to scrape data at scale, misuse accounts, or republish content without permission."
    paragraph_5: "If you proceed to offer, rent, or purchase a property, you should take your own professional advice before committing. Contracts, title checks, surveys, finance, and completion arrangements sit outside the scope of the website and remain the responsibility of the parties involved."

# Cookie Policy
  cookie_policy:
    title: "Cookie Policy"
    header: "Cookie Policy"
    blurb: "How we use cookies and similar technologies to keep the site working properly."
    paragraph_1: "We use essential cookies to keep sign-in secure, remember session information, and support core features such as language selection, forms, and account navigation."
    paragraph_2: "We may also use analytics or performance cookies to understand how visitors use the site, which pages are most helpful, and where journeys become confusing. That information helps us improve search, enquiry flows, and page performance."
    paragraph_3:  "You can manage or remove cookies through your browser settings at any time. If you block essential cookies, parts of the site such as sign in, saved preferences, and multi-step forms may stop working as intended."

# How It Works
  how_it_works:
    title: "How It Works"
    next: "Next"
    close: "Close"
    panel_title_1: "Save On Fees"
    panel_body_1: "Keep more control over the sale or let and reduce the cost of marketing by handling the parts of the process you know best."
    panel_title_2: "Price With Better Evidence"
    panel_body_2: "By using Land Registry data we can estimate the value of your property based on the prices real buyers paid and not the whims of an estate agent."
    panel_body_2_part_1: "By using "
    land_registry: "Land Registry"
    panel_body_2_part_2: " data we can estimate the value of your property based on the prices real buyers paid and not the whims of an estate agent."
    data_feeds: "Recent sale data and comparable local listings help you sense-check an asking price, spot overpricing early, and explain your figure to serious buyers."
    panel_title_3: "Present Your Home"
    panel_body_3: "Strong photography, an honest description, and clear room information usually outperform vague marketing and inflated promises."
    panel_title_4: "Control The Listing"
    panel_body_4: "Update the price, description, photos, and availability whenever circumstances change so buyers and tenants always see the current position."
    panel_title_5: "Book Viewings"
    panel_body_5: "Offer viewing times that work for you and keep a simple record of who is coming and what they asked."
    panel_title_6: "Track Interest"
    panel_body_6: "Keep enquiries, follow-up questions, and viewing feedback in one place so you can spot serious interest and respond quickly."
    panel_title_7: "Review Offers"
    panel_body_7: "Compare price, chain position, timescales, and buyer readiness before deciding which offer is strongest overall."
    panel_title_8: "Move Forward"
    panel_body_8: "Once terms are agreed, you can hand the transaction over to the solicitors with a clear record of the listing, the parties, and the agreed direction."
    manage_account: "Instructions"
    manage_account_body: "Use Manage Account to update your details, maintain active listings, and keep property information accurate as viewings and offers progress."
    numero1: "Save!"
    numero1_body: "Nobody knows your home better than you do, so your knowledge of layout, light, storage, and the neighbourhood can make viewings more useful for serious buyers."
    numero2: "Manage viewings"
    numero2_body: "Buyers and sellers can book viewings at times that suit them, without the delays that often come from relying on a third party to relay availability."
    numero3: "Offers"
    numero3_body: "You can discuss offers directly, keep notes on the terms, and decide how to proceed once you understand price, flexibility, and buyer position."
    numero4: "Conveyancing"
    numero4_body: "When it is time to complete the legal work, you still instruct a solicitor or licensed conveyancer, but you avoid paying extra agency fees for tasks you have handled yourself."

# About Us
  about_us:
    title: "About Us"
    header: "About GotTheKeys"
    all_about_us: "About GotTheKeys"
    blurb: "We built the service for owners who want clearer costs, better control, and a more direct route to serious enquiries."
    paragraph_1: "GotTheKeys was created for sellers and landlords who want professional-looking online marketing without handing every step of the process to a traditional agency."
    paragraph_2: "The platform lets you control the essentials: how your property is described, when photos are refreshed, how quickly enquiries are answered, and when viewings can happen. That usually leads to better communication and fewer delays."
    paragraph_3: "If you also market through an estate agent, read your agreement carefully. Terms such as sole agency and sole selling rights can affect when commission is payable, even if the eventual buyer or tenant first makes contact somewhere else."

