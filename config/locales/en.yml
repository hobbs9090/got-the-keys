# How It Works
  how_it_works:
    title: "How It Works"
    hero_title: "How to market your home with more clarity and less fluff"
    hero_body: "Good property marketing is usually simple: price the home sensibly, present it honestly, answer the questions buyers and tenants actually ask, and keep momentum once enquiries arrive. This page shows how to do that, and where GotTheKeys fits into the process."
    primary_cta: "Create your account"
    secondary_cta: "See the marketing guide"
    hero_badge: "Owner-led marketing"
    hero_panel_title: "What this page is for"
    hero_panel_body: "A practical guide to pricing, presentation, enquiries, viewings, offers, and the legal handoff."
    hero_point_1: "Set a price you can defend with evidence."
    hero_point_2: "Write a listing that answers real buyer questions."
    hero_point_3: "Keep viewings, feedback, and next steps moving."
    jump_nav_label: "How it works sections"
    jump_tab_process: "The process"
    jump_tab_marketing: "Market your home"
    jump_tab_viewings: "Viewings and offers"
    jump_tab_finish: "After agreement"
    process_eyebrow: "The process"
    process_title: "A simpler route from listing to agreed terms"
    process_intro: "The platform is designed to help owners keep control of the marketing and communication work, while still using a solicitor or licensed conveyancer when the legal stage begins."
    stage_1_title: "Prepare and price"
    stage_1_body: "Start with comparable sales, current competition, and a realistic view of condition. The aim is to generate genuine early interest, not to test the market for months."
    stage_2_title: "Present the home properly"
    stage_2_body: "Strong photos, an honest description, and clear room information usually outperform exaggerated copy and vague promises."
    stage_3_title: "Manage enquiries and viewings"
    stage_3_body: "Reply quickly, offer sensible availability, and keep track of what people ask so you can improve the listing and focus on serious interest."
    stage_4_title: "Review offers and move forward"
    stage_4_body: "Look at the whole position, not just price. Timescale, chain, mortgage readiness, and flexibility all matter before you instruct the legal team."
    marketing_eyebrow: "Market your home"
    marketing_title: "What strong home marketing actually looks like"
    marketing_intro: "Good marketing is not about making the home sound grander than it is. It is about helping the right buyer or tenant understand the property quickly and trust what they are seeing."
    marketing_card_1_title: "Set an asking price you can explain"
    marketing_card_1_body: "Use recent sold evidence, live competing listings, and the home's current condition. A realistic figure usually creates better momentum than an ambitious number that immediately needs reducing."
    marketing_card_2_title: "Prepare the home before photos"
    marketing_card_2_body: "Clean sightlines, natural light, and tidy rooms matter more than over-staging. The goal is to make space, layout, and condition easy to understand at a glance."
    marketing_card_3_title: "Write the listing around buyer questions"
    marketing_card_3_body: "Say what people actually need to know: layout, outside space, parking, storage, recent improvements, works still needed, and what makes the location practical day to day."
    marketing_card_4_title: "Keep the advert current once it is live"
    marketing_card_4_body: "If the price changes, the photos improve, or viewing availability shifts, update the listing quickly. Fresh, accurate information helps serious enquiries keep moving."
    pricing_badge: "Pricing note"
    pricing_title: "Use evidence, not hopeful guesswork"
    pricing_body: "Land Registry sold prices, live competing listings, and honest condition notes are a better starting point than choosing the figure you wish the home would achieve."
    publish_badge: "Before you publish"
    publish_title: "Five checks worth doing first"
    publish_check_1: "Lead with the photo that best explains the home, not simply the front door by default."
    publish_check_2: "Make sure the price is close enough to market to attract early attention."
    publish_check_3: "Be clear about room count, outside space, parking, storage, and any obvious compromises."
    publish_check_4: "Offer viewing times you can realistically honour so enquiries do not go cold."
    publish_check_5: "Know how you will answer questions about tenure, service charge, chain position, or move date."
    agency_note_badge: "Practical note"
    agency_note_title: "If another agent is involved"
    agency_note_body: "Read the agreement carefully. Terms such as sole agency and sole selling rights can affect whether commission is payable, even if the eventual buyer or tenant first finds the property somewhere else."
    playbook_eyebrow: "Practical guide"
    playbook_title: "How to market your home well"
    playbook_intro: "Strong marketing is not about exaggeration. It is about making the right person understand the home quickly, trust the details, and know what to do next."
    playbook_step_1_title: "1. Get the home photo-ready"
    playbook_step_1_body: "The aim is not to make the home look different. It is to make space, layout, and condition easy to read in a few seconds."
    playbook_step_1_point_1: "Open curtains, switch on lamps where needed, and photograph when the rooms have clean natural light."
    playbook_step_1_point_2: "Remove obvious clutter, bins, drying racks, and anything that makes room sizes hard to judge."
    playbook_step_1_point_3: "Choose the strongest lead image, not just the most obvious one."
    playbook_step_2_title: "2. Write the listing around real questions"
    playbook_step_2_body: "Good copy usually answers what someone would ask on a first viewing rather than relying on empty sales language."
    playbook_step_2_point_1: "Describe the layout honestly: kitchen diner, separate study, loft room, balcony, garden, parking, or shared access."
    playbook_step_2_point_2: "Explain why the home works day to day instead of calling everything stunning, unique, or must-see."
    playbook_step_2_point_3: "If the asking price reflects updating, a shorter lease, or some other compromise, frame that clearly enough for serious buyers."
    playbook_step_3_title: "3. Handle enquiries and viewings properly"
    playbook_step_3_body: "Fast, calm follow-up keeps good leads warm and helps you spot where the advert still needs work."
    playbook_step_3_point_1: "Reply while the property is still fresh in the enquirer's mind."
    playbook_step_3_point_2: "Offer realistic availability instead of overpromising and rescheduling later."
    playbook_step_3_point_3: "Keep notes on recurring questions so you can sharpen the advert and prepare better answers."
    playbook_step_4_title: "4. Use feedback and offers intelligently"
    playbook_step_4_body: "The best next step after a viewing is usually a short, useful follow-up rather than pressure."
    playbook_step_4_point_1: "Ask what held the viewer back: price, room sizes, works needed, or location."
    playbook_step_4_point_2: "Use recurring feedback to decide whether photos, wording, or price need adjusting."
    playbook_step_4_point_3: "Compare offers by readiness and reliability as well as headline figure."
    timeline_eyebrow: "Viewings and offers"
    timeline_title: "What happens once the home goes live"
    timeline_intro: "Once the listing is public, the job becomes less about presentation and more about pace, clarity, and follow-through."
    timeline_1_badge: "01 Launch"
    timeline_1_title: "Publish with the basics right"
    timeline_1_body: "Go live with strong photos, honest room details, and realistic viewing availability from the start."
    timeline_2_badge: "02 Enquiries"
    timeline_2_title: "Answer questions and qualify interest"
    timeline_2_body: "If the same confusion keeps appearing, improve the advert rather than answering the same issue one message at a time."
    timeline_3_badge: "03 Viewings"
    timeline_3_title: "Keep viewings simple and useful"
    timeline_3_body: "Offer times you can keep, arrive prepared, and record feedback while it is still fresh."
    timeline_4_badge: "04 Offers"
    timeline_4_title: "Compare the whole position"
    timeline_4_body: "Headline price matters, but so do chain status, mortgage readiness, flexibility, and how quickly the buyer or tenant can proceed."
    timeline_5_badge: "05 Legal stage"
    timeline_5_title: "Hand over to the legal team cleanly"
    timeline_5_body: "Once terms are agreed, the matter still goes to a solicitor or licensed conveyancer. Clear records make that handoff much easier."
    finish_eyebrow: "After agreement"
    finish_title: "Marketing gets you interest. Clear records help you close."
    finish_body: "GotTheKeys is designed to help owners keep the advert current, organise viewings, and move into the legal stage with less confusion and less wasted time."
    finish_primary_cta: "Create your account"
    finish_secondary_cta: "Talk to us"

# About Us
  about_us:
    title: "About Us"
    header: "About GotTheKeys"
    all_about_us: "About GotTheKeys"
    blurb: "We built the service for owners who want clearer costs, better control, and a more direct route to serious enquiries."
    paragraph_1: "GotTheKeys was created for sellers and landlords who want professional-looking online marketing without handing every step of the process to a traditional agency."
    paragraph_2: "The platform lets you control the essentials: how your property is described, when photos are refreshed, how quickly enquiries are answered, and when viewings can happen. That usually leads to better communication and fewer delays."
    paragraph_3: "If you also market through an estate agent, read your agreement carefully. Terms such as sole agency and sole selling rights can affect when commission is payable, even if the eventual buyer or tenant first makes contact somewhere else."

