        existing_enquiry_body: Sie haben eine offene Anfrage (%{source}) - Referenz %{reference}.
        existing_offer_body: Sie haben ein ausstehendes Angebot über %{amount} für dieses Objekt - Referenz %{reference}.
        existing_rental_application_body: Sie haben eine ausstehende Mietbewerbung für dieses Objekt - Referenz %{reference}.
