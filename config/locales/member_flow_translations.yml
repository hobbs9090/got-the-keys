        view_existing_enquiry: Anfrage ansehen
        view_existing_offer: Angebot ansehen
        view_existing_rental_application: Bewerbung ansehen
        withdraw_existing_offer: Angebot zurückziehen
        withdraw_existing_rental_application: Bewerbung zurückziehen
    rental_applications:
      show:
        back_to_property: Zurück zum Objekt
        eyebrow: Details zur Mietbewerbung
        hero_body: Ihre Bewerbungsreferenz, Zusammenfassung und Statushistorie bleiben hier sichtbar, während das Team Ihre Bewerbung prüft.
        manage_body: Sie können zum Objekt zurückkehren oder diese Bewerbung zurückziehen, solange sie noch offen ist.
