services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      RAILS_ENV: production
      PORT: 3000
      APP_HOST: ${APP_HOST}
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      DATABASE_URL: ${DATABASE_URL}
      RAILS_SERVE_STATIC_FILES: ${RAILS_SERVE_STATIC_FILES:-1}
      FORCE_SSL: ${FORCE_SSL:-true}
      ASSUME_SSL: ${ASSUME_SSL:-true}
      RAILS_LOG_LEVEL: ${RAILS_LOG_LEVEL:-info}
      ACTIVE_JOB_QUEUE_ADAPTER: ${ACTIVE_JOB_QUEUE_ADAPTER:-async}
      RAILS_MAX_THREADS: ${RAILS_MAX_THREADS:-5}
      WEB_CONCURRENCY: ${WEB_CONCURRENCY:-1}
      SMTP_ADDRESS: ${SMTP_ADDRESS:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_DOMAIN: ${SMTP_DOMAIN:-}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_AUTHENTICATION: ${SMTP_AUTHENTICATION:-plain}
      SMTP_STARTTLS_AUTO: ${SMTP_STARTTLS_AUTO:-true}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${APP_BIND_ADDRESS:-0.0.0.0}:${APP_PORT:-3000}:3000"
    volumes:
      - ${SYNOLOGY_APP_ROOT:-/volume1/docker/gotthekeys}/storage:/app/storage
      - ${SYNOLOGY_APP_ROOT:-/volume1/docker/gotthekeys}/tmp-mails:/app/tmp/mails

  db:
    image: postgres:16-bookworm
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gotthekeys_production}
      POSTGRES_USER: ${POSTGRES_USER:-gotthekeys}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gotthekeys} -d ${POSTGRES_DB:-gotthekeys_production}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - ${SYNOLOGY_APP_ROOT:-/volume1/docker/gotthekeys}/postgres:/var/lib/postgresql/data
