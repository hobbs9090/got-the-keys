name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      pages: write
      id-token: write
    outputs:
      allure_report_present: ${{ steps.allure_report.outputs.present }}
      pages_enabled: ${{ steps.pages_config.outcome == 'success' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Guard spec coverage rules
        run: ruby bin/ensure_spec_changes

      - name: Set up GitHub Pages
        id: pages_config
        if: ${{ github.event_name == 'push' && github.ref_name == 'main' }}
        continue-on-error: true
        uses: actions/configure-pages@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Install Node dependencies
        run: npm ci

      - name: Install WebP tools
        run: |
          sudo apt-get update
          sudo apt-get install -y webp

      - name: Check locale health
        run: bin/i18n_health

      - name: Build frontend assets
        run: npm run build

      - name: Setup test db
        run: bundle exec rails db:prepare

      - name: Run RSpec
        env:
          ALLURE_CLEAN_RESULTS: "1"
          ALLURE_REPORTS: "1"
          ALLURE_RESULTS_DIR: tmp/allure-results
        run: bundle exec rspec --require allure-rspec --format progress --format json --out tmp/rspec-report.json --format AllureRspecFormatter

      - name: Publish RSpec report summary
        if: ${{ always() }}
        run: ruby bin/ci_rspec_report tmp/rspec-report.json tmp/rspec-report.md

      - name: Generate Allure report
        if: ${{ always() && hashFiles('tmp/allure-results/*') != '' }}
        run: npx allure generate tmp/allure-results --output tmp/allure-report --report-name "GotTheKeys RSpec"

      - name: Check Allure report output
        if: ${{ always() }}
        id: allure_report
        run: |
          if [ -f tmp/allure-report/index.html ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload RSpec report artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          retention-days: 7
          name: rspec-report
          path: |
            tmp/rspec-report.json
            tmp/rspec-report.md
          if-no-files-found: warn

      - name: Upload Allure report artifacts
        if: ${{ always() && steps.allure_report.outputs.present == 'true' }}
        uses: actions/upload-artifact@v7
        with:
          retention-days: 7
          name: allure-rspec-report
          path: |
            tmp/allure-results
            tmp/allure-report
          if-no-files-found: warn

      - name: Build GitHub Pages report site
        if: ${{ always() && steps.allure_report.outputs.present == 'true' }}
        env:
          RSPEC_REPORT_JSON: tmp/rspec-report.json
          RSPEC_REPORT_MARKDOWN: tmp/rspec-report.md
          ALLURE_REPORT_DIR: tmp/allure-report
          PAGES_OUTPUT_DIR: tmp/ci-report-site
        run: ruby .github/scripts/build_rspec_pages_site.rb

      - name: Upload GitHub Pages artifact
        if: ${{ success() && steps.pages_config.outcome == 'success' && steps.allure_report.outputs.present == 'true' && github.event_name == 'push' && github.ref_name == 'main' }}
        uses: actions/upload-pages-artifact@v4
        with:
          path: tmp/ci-report-site

  security:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Brakeman static analysis
        run: bundle exec brakeman --no-pager -q

      - name: bundler-audit dependency scan
        run: |
          bundle exec bundler-audit update
          bundle exec bundler-audit check

  deploy-rspec-report:
    if: ${{ github.event_name == 'push' && github.ref_name == 'main' && needs.test.result == 'success' && needs.test.outputs.allure_report_present == 'true' && needs.test.outputs.pages_enabled == 'true' }}
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy Allure report to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Publish report URL
        run: echo "Published Allure RSpec report to ${{ steps.deployment.outputs.page_url }}" >> "$GITHUB_STEP_SUMMARY"
