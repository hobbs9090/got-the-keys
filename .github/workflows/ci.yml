name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Install dependencies
        run: |
          bundle config set --local path 'vendor/bundle'
          bundle install --jobs 4 --retry 3
          npm ci

      - name: Build frontend assets
        run: npm run build

      - name: Setup test db
        run: bundle exec rails db:prepare

      - name: Run RSpec
        run: bundle exec rspec --format progress --format json --out tmp/rspec-report.json

      - name: Publish RSpec report summary
        if: ${{ always() }}
        run: ruby bin/ci_rspec_report tmp/rspec-report.json tmp/rspec-report.md

      - name: Upload RSpec report artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: rspec-report
          path: |
            tmp/rspec-report.json
            tmp/rspec-report.md
          if-no-files-found: warn

      - name: Run Cucumber
        run: bundle exec cucumber
