name: Deploy Staging

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref or commit SHA to deploy
        required: true
        default: main
        type: string
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  actions: read
  contents: read

concurrency:
  group: staging-deploy
  cancel-in-progress: false

jobs:
  deploy:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push' &&
       github.event.workflow_run.head_branch == 'main')
    runs-on:
      - self-hosted
      - Linux
      - X64
    timeout-minutes: 30
    environment:
      name: staging
      url: ${{ format('https://{0}', vars.STAGING_APP_HOST) }}

    env:
      BUNDLE_PATH: vendor/bundle
      BUNDLE_WITHOUT: "doc production test"
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_HOST: ${{ secrets.STAGING_DEPLOY_HOST }}
      DEPLOY_TO: ${{ secrets.STAGING_DEPLOY_TO }}
      DEPLOY_REPO_URL: ${{ secrets.DEPLOY_REPO_URL }}
      DEPLOY_MIRROR_URL: ${{ secrets.STAGING_DEPLOY_MIRROR_URL }}
      APP_HOST: ${{ secrets.STAGING_APP_HOST }}

    steps:
      - name: Checkout requested ref
        if: github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0
          persist-credentials: false

      - name: Checkout tested commit
        if: github.event_name == 'workflow_run'
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Use shared deployment Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: false

      - name: Cache deployment bundle
        uses: actions/cache@v5
        with:
          path: vendor/bundle
          key: deploy-bundle-${{ runner.os }}-without-doc-production-test-${{ hashFiles('Gemfile.lock', '.ruby-version') }}

      - name: Ensure PostgreSQL client headers
        run: |
          if command -v pg_config >/dev/null 2>&1; then
            echo "Using pg_config at $(command -v pg_config)"
            pg_config --version
            exit 0
          fi

          if ! command -v apt-get >/dev/null 2>&1; then
            echo "pg_config is missing and this runner does not expose apt-get for installing libpq-dev." >&2
            exit 1
          fi

          if command -v sudo >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y libpq-dev
          elif [ "$(id -u)" -eq 0 ]; then
            apt-get update
            apt-get install -y libpq-dev
          else
            echo "pg_config is missing and passwordless sudo is not available to install libpq-dev." >&2
            exit 1
          fi

          echo "Installed pg_config at $(command -v pg_config)"
          pg_config --version

      - name: Install deployment gems
        run: |
          bundle config set path "$BUNDLE_PATH"
          bundle config set without "$BUNDLE_WITHOUT"
          bundle config set build.pg "--with-pg-config=$(command -v pg_config)"
          bundle check || bundle install --jobs 4 --retry 3

      - name: Refresh deploy host key
        env:
          DEPLOY_HOST_KEY: ${{ secrets.DEPLOY_HOST_KEY }}
        run: bin/refresh_deploy_known_hosts

      - name: Verify deploy SSH path
        run: ssh -o BatchMode=yes "${DEPLOY_USER}@${DEPLOY_HOST}" "whoami"

      - name: Record deploy metadata
        id: deploy_meta
        run: |
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "short_sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "ref=deploy/$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Deploy exact tested commit
        env:
          DEPLOY_SHA: ${{ steps.deploy_meta.outputs.sha }}
          DEPLOY_REF: ${{ steps.deploy_meta.outputs.ref }}
          APP_BUILD_SHA: ${{ steps.deploy_meta.outputs.short_sha }}
          APP_BUILD_NUMBER: ${{ github.run_number }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DATABASE_NAME: ${{ vars.DATABASE_NAME }}
          DATABASE_HOST: ${{ secrets.DATABASE_HOST }}
          DATABASE_PORT: ${{ vars.DATABASE_PORT }}
          DATABASE_USERNAME: ${{ secrets.DATABASE_USERNAME }}
          DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
          SMTP_ADDRESS: ${{ secrets.SMTP_ADDRESS }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_DOMAIN: ${{ secrets.SMTP_DOMAIN }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_AUTHENTICATION: ${{ vars.SMTP_AUTHENTICATION }}
          SMTP_STARTTLS_AUTO: ${{ vars.SMTP_STARTTLS_AUTO }}
        run: bin/deploy_staging

      - name: Health check staging deployment
        env:
          HEALTHCHECK_HOST: ${{ env.APP_HOST }}
          HEALTHCHECK_URL: https://${{ env.APP_HOST }}/up
        run: |
          for attempt in $(seq 1 12); do
            status=$(curl --silent --show-error --output /tmp/staging-health.txt --write-out "%{http_code}" \
              --connect-timeout 5 \
              --max-time 15 \
              --resolve "${HEALTHCHECK_HOST}:443:127.0.0.1" \
              "$HEALTHCHECK_URL" || true)
            body=$(cat /tmp/staging-health.txt 2>/dev/null || true)

            if [ "$status" = "200" ] && [ "$body" = "OK" ]; then
              echo "Staging health check passed on attempt ${attempt}."
              exit 0
            fi

            echo "Staging health check attempt ${attempt} failed: status=${status} body=${body}"
            sleep 5
          done

          echo "Staging health check failed for ${HEALTHCHECK_URL}" >&2
          exit 1

      - name: Dispatch staging acceptance
        env:
          GH_TOKEN: ${{ secrets.ACCEPTANCE_REPO_DISPATCH_TOKEN }}
          ACCEPTANCE_EVENT_TYPE: staging_acceptance
          ACCEPTANCE_ENVIRONMENT: staging
          ACCEPTANCE_BASE_URL: ${{ format('https://{0}/', env.APP_HOST) }}
          APP_REPOSITORY: ${{ github.repository }}
          APP_SHA: ${{ steps.deploy_meta.outputs.sha }}
          APP_SHORT_SHA: ${{ steps.deploy_meta.outputs.short_sha }}
          DEPLOY_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          payload="$(ruby -rjson -e 'puts JSON.generate(
            event_type: ENV.fetch("ACCEPTANCE_EVENT_TYPE"),
            client_payload: {
              environment: ENV.fetch("ACCEPTANCE_ENVIRONMENT"),
              base_url: ENV.fetch("ACCEPTANCE_BASE_URL"),
              app_repository: ENV.fetch("APP_REPOSITORY"),
              app_sha: ENV.fetch("APP_SHA"),
              app_short_sha: ENV.fetch("APP_SHORT_SHA"),
              deploy_run_url: ENV.fetch("DEPLOY_RUN_URL")
            }
          )')"

          curl --fail-with-body --silent --show-error \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/hobbs9090/rails_got_the_keys_acceptance/dispatches \
            --data "$payload"
