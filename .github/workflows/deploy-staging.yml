name: Deploy Staging

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref or commit SHA to deploy
        required: true
        default: master
        type: string
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  actions: read
  contents: read

concurrency:
  group: staging-deploy
  cancel-in-progress: false

jobs:
  deploy:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push' &&
       github.event.workflow_run.head_branch == 'master')
    runs-on:
      - self-hosted
      - Linux
      - X64
      - nirvana
    timeout-minutes: 30
    environment:
      name: staging
      url: https://stevenhobbs.co.uk

    env:
      BUNDLE_PATH: vendor/bundle
      BUNDLE_WITHOUT: "doc production test"
      DEPLOY_USER: steven
      DEPLOY_HOST: 127.0.0.1
      DEPLOY_TO: /var/www/stevenhobbs.co.uk
      DEPLOY_REPO_URL: /home/steven/git/rails_got_the_keys.git
      APP_HOST: stevenhobbs.co.uk

    steps:
      - name: Checkout requested ref
        if: github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0
          persist-credentials: false

      - name: Checkout tested commit
        if: github.event_name == 'workflow_run'
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Use shared deployment Ruby
        run: |
          export PATH="/home/steven/.rbenv/versions/3.4.7/bin:$PATH"
          echo "/home/steven/.rbenv/versions/3.4.7/bin" >> "$GITHUB_PATH"
          ruby -v
          bundle -v

      - name: Cache deployment bundle
        uses: actions/cache@v5
        with:
          path: vendor/bundle
          key: deploy-bundle-${{ runner.os }}-without-doc-production-test-${{ hashFiles('Gemfile.lock', '.ruby-version') }}

      - name: Install deployment gems
        run: |
          bundle config set path "$BUNDLE_PATH"
          bundle config set without "$BUNDLE_WITHOUT"
          bundle check || bundle install --jobs 4 --retry 3

      - name: Verify deploy SSH path
        run: ssh -o BatchMode=yes steven@127.0.0.1 "whoami"

      - name: Record deploy metadata
        id: deploy_meta
        run: |
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "short_sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "ref=deploy/$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Deploy exact tested commit
        env:
          DEPLOY_SHA: ${{ steps.deploy_meta.outputs.sha }}
          DEPLOY_REF: ${{ steps.deploy_meta.outputs.ref }}
          APP_BUILD_SHA: ${{ steps.deploy_meta.outputs.short_sha }}
          APP_BUILD_NUMBER: ${{ github.run_number }}
        run: bin/deploy_staging
