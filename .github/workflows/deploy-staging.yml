name: Deploy Staging

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref or commit SHA to deploy
        required: true
        default: main
        type: string
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  actions: read
  contents: read

concurrency:
  group: staging-deploy
  cancel-in-progress: false

jobs:
  deploy:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push' &&
       github.event.workflow_run.head_branch == 'main')
    runs-on:
      - self-hosted
      - Linux
      - X64
    timeout-minutes: 30
    environment:
      name: staging
      url: https://stevenhobbs.co.uk

    env:
      BUNDLE_PATH: vendor/bundle
      BUNDLE_WITHOUT: "doc production test"
      DEPLOY_USER: steven
      DEPLOY_HOST: 192.168.2.204
      DEPLOY_TO: /var/www/gotthekeys-staging
      DEPLOY_REPO_URL: /home/steven/git/rails_got_the_keys.git
      APP_HOST: stevenhobbs.co.uk

    steps:
      - name: Checkout requested ref
        if: github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0
          persist-credentials: false

      - name: Checkout tested commit
        if: github.event_name == 'workflow_run'
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Use shared deployment Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: false

      - name: Cache deployment bundle
        uses: actions/cache@v5
        with:
          path: vendor/bundle
          key: deploy-bundle-${{ runner.os }}-without-doc-production-test-${{ hashFiles('Gemfile.lock', '.ruby-version') }}

      - name: Ensure PostgreSQL client headers
        run: |
          if command -v pg_config >/dev/null 2>&1; then
            echo "Using pg_config at $(command -v pg_config)"
            pg_config --version
            exit 0
          fi

          if ! command -v apt-get >/dev/null 2>&1; then
            echo "pg_config is missing and this runner does not expose apt-get for installing libpq-dev." >&2
            exit 1
          fi

          if command -v sudo >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y libpq-dev
          elif [ "$(id -u)" -eq 0 ]; then
            apt-get update
            apt-get install -y libpq-dev
          else
            echo "pg_config is missing and passwordless sudo is not available to install libpq-dev." >&2
            exit 1
          fi

          echo "Installed pg_config at $(command -v pg_config)"
          pg_config --version

      - name: Install deployment gems
        run: |
          bundle config set path "$BUNDLE_PATH"
          bundle config set without "$BUNDLE_WITHOUT"
          bundle config set build.pg "--with-pg-config=$(command -v pg_config)"
          bundle check || bundle install --jobs 4 --retry 3

      - name: Refresh deploy host key
        env:
          DEPLOY_HOST_KEY: ${{ secrets.DEPLOY_HOST_KEY }}
        run: bin/refresh_deploy_known_hosts

      - name: Verify deploy SSH path
        run: ssh -o BatchMode=yes "${DEPLOY_USER}@${DEPLOY_HOST}" "whoami"

      - name: Record deploy metadata
        id: deploy_meta
        run: |
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "short_sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "ref=deploy/$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Deploy exact tested commit
        env:
          DEPLOY_SHA: ${{ steps.deploy_meta.outputs.sha }}
          DEPLOY_REF: ${{ steps.deploy_meta.outputs.ref }}
          APP_BUILD_SHA: ${{ steps.deploy_meta.outputs.short_sha }}
          APP_BUILD_NUMBER: ${{ github.run_number }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DATABASE_NAME: ${{ vars.DATABASE_NAME }}
          DATABASE_HOST: ${{ secrets.DATABASE_HOST }}
          DATABASE_PORT: ${{ vars.DATABASE_PORT }}
          DATABASE_USERNAME: ${{ secrets.DATABASE_USERNAME }}
          DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
        run: bin/deploy_staging

      - name: Ensure GitHub CLI
        run: |
          if command -v gh >/dev/null 2>&1; then
            echo "Using gh at $(command -v gh)"
            gh --version
            exit 0
          fi

          if ! command -v apt-get >/dev/null 2>&1; then
            echo "gh is missing and this runner does not expose apt-get for installation." >&2
            exit 1
          fi

          if command -v sudo >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y gh
          elif [ "$(id -u)" -eq 0 ]; then
            apt-get update
            apt-get install -y gh
          else
            echo "gh is missing and passwordless sudo is not available to install it." >&2
            exit 1
          fi

          echo "Installed gh at $(command -v gh)"
          gh --version

      - name: Dispatch staging acceptance
        env:
          GH_TOKEN: ${{ secrets.ACCEPTANCE_REPO_DISPATCH_TOKEN }}
        run: |
          gh api \
            repos/hobbs9090/rails_got_the_keys_acceptance/dispatches \
            --method POST \
            -f event_type=staging_acceptance \
            -F client_payload[environment]=staging \
            -F client_payload[base_url]=https://stevenhobbs.co.uk/
