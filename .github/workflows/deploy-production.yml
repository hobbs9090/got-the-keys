name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref or commit SHA to deploy
        required: true
        default: main
        type: string
      app_host:
        description: Public hostname for the production app
        required: true
        default: gotthekeys.uk
        type: string
      deploy_to:
        description: Capistrano deploy root on the Linux host
        required: true
        default: /var/www/gotthekeys-production
        type: string
  workflow_run:
    workflows: ["Deploy Staging"]
    types: [completed]

permissions:
  actions: read
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    runs-on:
      - self-hosted
      - Linux
      - X64
      - nirvana
    timeout-minutes: 30
    environment:
      name: production
      url: ${{ format('https://{0}', github.event_name == 'workflow_dispatch' && inputs.app_host || 'gotthekeys.uk') }}

    env:
      BUNDLE_PATH: vendor/bundle
      BUNDLE_WITHOUT: "doc staging test"
      DEPLOY_USER: steven
      DEPLOY_HOST: 127.0.0.1
      DEPLOY_TO: ${{ github.event_name == 'workflow_dispatch' && inputs.deploy_to || '/var/www/gotthekeys-production' }}
      DEPLOY_REPO_URL: /home/steven/git/rails_got_the_keys.git
      APP_HOST: ${{ github.event_name == 'workflow_dispatch' && inputs.app_host || 'gotthekeys.uk' }}

    steps:
      - name: Checkout requested ref
        if: github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0
          persist-credentials: false

      - name: Checkout staging-tested commit
        if: github.event_name == 'workflow_run'
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Use shared deployment Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: false

      - name: Cache deployment bundle
        uses: actions/cache@v5
        with:
          path: vendor/bundle
          key: deploy-production-bundle-${{ runner.os }}-without-doc-staging-test-${{ hashFiles('Gemfile.lock', '.ruby-version') }}

      - name: Ensure PostgreSQL client headers
        run: |
          if command -v pg_config >/dev/null 2>&1; then
            echo "Using pg_config at $(command -v pg_config)"
            pg_config --version
            exit 0
          fi

          if ! command -v apt-get >/dev/null 2>&1; then
            echo "pg_config is missing and this runner does not expose apt-get for installing libpq-dev." >&2
            exit 1
          fi

          if command -v sudo >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y libpq-dev
          elif [ "$(id -u)" -eq 0 ]; then
            apt-get update
            apt-get install -y libpq-dev
          else
            echo "pg_config is missing and passwordless sudo is not available to install libpq-dev." >&2
            exit 1
          fi

          echo "Installed pg_config at $(command -v pg_config)"
          pg_config --version

      - name: Install deployment gems
        run: |
          bundle config set path "$BUNDLE_PATH"
          bundle config set without "$BUNDLE_WITHOUT"
          bundle config set build.pg "--with-pg-config=$(command -v pg_config)"
          bundle check || bundle install --jobs 4 --retry 3

      - name: Refresh deploy host key
        env:
          DEPLOY_HOST_KEY: ${{ secrets.DEPLOY_HOST_KEY }}
        run: bin/refresh_deploy_known_hosts

      - name: Verify deploy SSH path
        run: ssh -o BatchMode=yes "${DEPLOY_USER}@${DEPLOY_HOST}" "whoami"

      - name: Record deploy metadata
        id: deploy_meta
        run: |
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "short_sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "ref=deploy/$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Validate production runtime configuration
        env:
          DEVISE_SECRET_KEY: ${{ secrets.DEVISE_SECRET_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DATABASE_NAME: ${{ secrets.DATABASE_NAME }}
          DATABASE_HOST: ${{ secrets.DATABASE_HOST }}
          DATABASE_PORT: ${{ secrets.DATABASE_PORT }}
          DATABASE_USERNAME: ${{ secrets.DATABASE_USERNAME }}
          DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
        run: |
          if [ -z "$DEVISE_SECRET_KEY" ]; then
            echo "Missing required production secret: DEVISE_SECRET_KEY" >&2
            exit 1
          fi

          if [ -n "$DATABASE_URL" ]; then
            echo "Using DATABASE_URL from GitHub production secrets."
            exit 0
          fi

          if [ -n "$DATABASE_HOST$DATABASE_PORT$DATABASE_USERNAME$DATABASE_PASSWORD" ]; then
            missing=()
            [ -n "$DATABASE_NAME" ] || missing+=("DATABASE_NAME")
            [ -n "$DATABASE_HOST" ] || missing+=("DATABASE_HOST")
            [ -n "$DATABASE_USERNAME" ] || missing+=("DATABASE_USERNAME")
            [ -n "$DATABASE_PASSWORD" ] || missing+=("DATABASE_PASSWORD")

            if [ "${#missing[@]}" -gt 0 ]; then
              echo "Incomplete production database configuration. Set DATABASE_URL or all of: DATABASE_NAME, DATABASE_HOST, DATABASE_USERNAME, DATABASE_PASSWORD." >&2
              echo "Missing: ${missing[*]}" >&2
              exit 1
            fi

            echo "Using discrete production database settings from GitHub production secrets."
            exit 0
          fi

          echo "No GitHub production database secrets configured; deploy will use the local Postgres socket defaults for gotthekeys_production."

      - name: Verify production database migration access
        env:
          RAILS_ENV: production
          APP_HOST: ${{ env.APP_HOST }}
          DEVISE_SECRET_KEY: ${{ secrets.DEVISE_SECRET_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DATABASE_NAME: ${{ secrets.DATABASE_NAME }}
          DATABASE_HOST: ${{ secrets.DATABASE_HOST }}
          DATABASE_PORT: ${{ secrets.DATABASE_PORT }}
          DATABASE_USERNAME: ${{ secrets.DATABASE_USERNAME }}
          DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
          FORCE_SSL: ${{ vars.FORCE_SSL }}
          ASSUME_SSL: ${{ vars.ASSUME_SSL }}
          RAILS_LOG_LEVEL: ${{ vars.RAILS_LOG_LEVEL }}
          ACTIVE_JOB_QUEUE_ADAPTER: ${{ vars.ACTIVE_JOB_QUEUE_ADAPTER }}
          SMTP_ADDRESS: ${{ secrets.SMTP_ADDRESS }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_DOMAIN: ${{ secrets.SMTP_DOMAIN }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_AUTHENTICATION: ${{ vars.SMTP_AUTHENTICATION }}
          SMTP_STARTTLS_AUTO: ${{ vars.SMTP_STARTTLS_AUTO }}
        run: bin/check_database_migration_access

      - name: Deploy exact tested commit
        env:
          DEPLOY_SHA: ${{ steps.deploy_meta.outputs.sha }}
          DEPLOY_REF: ${{ steps.deploy_meta.outputs.ref }}
          APP_BUILD_SHA: ${{ steps.deploy_meta.outputs.short_sha }}
          APP_BUILD_NUMBER: ${{ github.run_number }}
          APP_HOST: ${{ env.APP_HOST }}
          DEVISE_SECRET_KEY: ${{ secrets.DEVISE_SECRET_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DATABASE_NAME: ${{ secrets.DATABASE_NAME }}
          DATABASE_HOST: ${{ secrets.DATABASE_HOST }}
          DATABASE_PORT: ${{ secrets.DATABASE_PORT }}
          DATABASE_USERNAME: ${{ secrets.DATABASE_USERNAME }}
          DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
          FORCE_SSL: ${{ vars.FORCE_SSL }}
          ASSUME_SSL: ${{ vars.ASSUME_SSL }}
          RAILS_LOG_LEVEL: ${{ vars.RAILS_LOG_LEVEL }}
          ACTIVE_JOB_QUEUE_ADAPTER: ${{ vars.ACTIVE_JOB_QUEUE_ADAPTER }}
          SMTP_ADDRESS: ${{ secrets.SMTP_ADDRESS }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_DOMAIN: ${{ secrets.SMTP_DOMAIN }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_AUTHENTICATION: ${{ vars.SMTP_AUTHENTICATION }}
          SMTP_STARTTLS_AUTO: ${{ vars.SMTP_STARTTLS_AUTO }}
        run: bin/deploy_production

      - name: Health check production deployment
        env:
          HEALTHCHECK_URL: https://${{ env.APP_HOST }}/up
        run: |
          for attempt in $(seq 1 12); do
            status=$(curl --silent --show-error --output /tmp/production-health.txt --write-out "%{http_code}" "$HEALTHCHECK_URL" || true)
            body=$(cat /tmp/production-health.txt 2>/dev/null || true)

            if [ "$status" = "200" ] && [ "$body" = "OK" ]; then
              echo "Production health check passed on attempt ${attempt}."
              exit 0
            fi

            echo "Production health check attempt ${attempt} failed: status=${status} body=${body}"
            sleep 5
          done

          echo "Production health check failed for ${HEALTHCHECK_URL}" >&2
          exit 1

      - name: Dispatch production acceptance
        env:
          GH_TOKEN: ${{ secrets.ACCEPTANCE_REPO_DISPATCH_TOKEN }}
        run: |
          curl --fail-with-body --silent --show-error \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/hobbs9090/rails_got_the_keys_acceptance/dispatches \
            -d '{"event_type":"production_acceptance","client_payload":{"base_url":"https://${{ env.APP_HOST }}/"}}'
